        .hub-name{font-size:1rem;font-weight:900;margin-bottom:.2rem}
        .hub-desc{font-size:.75rem;opacity:.5;line-height:1.4}
        .hub-badge{display:inline-block;font-size:.6rem;font-weight:700;padding:.15rem .5rem;border-radius:6px;margin-top:.3rem}
        .badge-math{background:rgba(78,205,196,.12);color:var(--accent-o)}
        .badge-game{background:rgba(255,107,107,.12);color:var(--accent-x)}
        .badge-study{background:rgba(255,217,61,.12);color:var(--accent-gold)}
