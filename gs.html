<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識溫習 | 姚家遊戲區</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="nav.css">
    <style>
        .gs-title{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:.3rem;background:linear-gradient(135deg,var(--accent-gold),var(--accent-o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gs-sub{text-align:center;opacity:.5;margin-bottom:1.2rem;font-size:.85rem}
        .gs-badge{display:inline-block;background:rgba(78,205,196,.12);color:var(--accent-o);font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:8px;margin-bottom:.8rem}
        .mode-bar{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap;justify-content:center}
        .mode-btn{padding:.5rem .8rem;border-radius:10px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s}
        .mode-btn:hover{border-color:rgba(255,255,255,.2)}.mode-btn.active{border-color:var(--accent-o);background:rgba(78,205,196,.1);color:var(--accent-o)}
        .mode-panel{display:none;width:100%;max-width:620px}.mode-panel.active{display:block}

        .topic-section{margin-bottom:1.5rem}.topic-header{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;margin-bottom:.6rem;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,.05);font-weight:900;font-size:.9rem}
        .topic-count{margin-left:auto;font-size:.7rem;opacity:.35}

        /* ── Scene cards ── */
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
        .scene-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative;border:1px solid rgba(255,255,255,.08)}
        .scene-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.4)}
        .scene-card.flipped .sc-front{opacity:0;pointer-events:none}.scene-card.flipped .sc-back{opacity:1;pointer-events:auto}
        .sc-front,.sc-back{transition:opacity .35s}
        .sc-back{position:absolute;inset:0;opacity:0;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.8rem;pointer-events:none}

        .sc-illustration{width:100%;height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
        .sc-illustration svg{width:100%;height:100%}
        .sc-label{padding:.5rem;text-align:center;background:var(--bg-card)}
        .sc-word{font-size:1.1rem;font-weight:900}.sc-tap{font-size:.5rem;opacity:.2;margin-top:.15rem}

        .sc-back-word{font-size:1.8rem;font-weight:900;color:var(--accent-gold);letter-spacing:.15em;margin-bottom:.3rem}
        .sc-back-hint{font-size:.72rem;opacity:.55;line-height:1.4;margin-bottom:.3rem}
        .sc-back-sent{font-size:.68rem;opacity:.4;line-height:1.4;font-style:italic}

        /* ── Writing ── */
        .write-card{background:var(--bg-card);border-radius:20px;padding:1.5rem;box-shadow:0 20px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);text-align:center}
        .write-illust{width:200px;height:140px;margin:0 auto .5rem;border-radius:12px;overflow:hidden}
        .write-illust svg{width:100%;height:100%}
        .write-hint{font-size:.9rem;font-weight:700;margin-bottom:.4rem;opacity:.7}
        .write-prompt{font-size:.75rem;opacity:.35;margin-bottom:.5rem}

        .char-rows{display:flex;flex-direction:column;gap:12px;margin-bottom:.7rem;width:100%}
        .char-row{display:flex;gap:8px;align-items:center;justify-content:center}
        .char-row-label{font-size:.7rem;opacity:.35;font-weight:700;width:100%;text-align:center;margin-bottom:2px}
        .char-write{position:relative;flex:1;max-width:140px;aspect-ratio:1;border-radius:12px;overflow:hidden;border:2px solid var(--grid-line);background:#fff;touch-action:none}
        .char-write canvas{display:block;width:100%;height:100%;cursor:crosshair}
        .char-write-grid{position:absolute;inset:0;pointer-events:none}
        .char-write-grid line{stroke:#ddd;stroke-width:1;stroke-dasharray:5 4}
        .char-write-num{position:absolute;top:3px;left:6px;font-size:.65rem;color:#bbb;pointer-events:none;font-weight:700;z-index:2}
        .char-ref{flex:1;max-width:140px;aspect-ratio:1;border-radius:12px;background:rgba(255,255,255,.05);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:900;color:rgba(255,255,255,.1);font-family:'Noto Sans TC',sans-serif;transition:all .3s;border:2px dashed var(--grid-line)}
        .char-ref.show{background:#fff;color:#222;font-size:4rem;border:2px solid #e0e0e0;border-style:solid}
        .char-pair-label{display:flex;gap:8px;justify-content:center;width:100%;max-width:296px;margin:0 auto}
        .char-pair-label span{flex:1;max-width:140px;text-align:center;font-size:.6rem;opacity:.3;font-weight:700}

        .write-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:.5rem}
        .w-btn{padding:.5rem 1rem;border-radius:10px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .15s}
        .w-btn:hover{border-color:rgba(255,255,255,.2)}.w-btn.green{border-color:var(--accent-o);color:var(--accent-o)}.w-btn.red{border-color:var(--accent-x);color:var(--accent-x)}.w-btn.gold{border-color:var(--accent-gold);color:var(--accent-gold)}

        .learn-box{background:rgba(255,217,61,.08);border:2px solid rgba(255,217,61,.2);border-radius:14px;padding:1rem;margin:.8rem 0;text-align:center;display:none}
        .learn-box.show{display:block}
        .learn-word{font-size:2.5rem;font-weight:900;color:var(--accent-gold);letter-spacing:.2em;margin-bottom:.4rem}
        .learn-hint{font-size:.85rem;opacity:.6;margin-bottom:.3rem}
        .learn-sent{font-size:.8rem;opacity:.45;font-style:italic}
        .learn-tip{font-size:.75rem;color:var(--accent-o);margin-top:.5rem;font-weight:700}

        .write-progress{display:flex;align-items:center;justify-content:center;gap:.5rem;font-size:.7rem;opacity:.35;margin-top:.4rem}
        .write-progress-dots{display:flex;gap:3px}.w-dot{width:7px;height:7px;border-radius:50%;background:var(--grid-line)}.w-dot.done{background:var(--accent-o)}.w-dot.wrong{background:var(--accent-x)}.w-dot.current{background:var(--accent-gold);box-shadow:0 0 6px var(--accent-gold)}

        /* ── Admin ── */
        .admin-gate{background:var(--bg-card);border-radius:20px;padding:2rem;box-shadow:0 20px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);text-align:center;max-width:400px;margin:0 auto}
        .admin-gate input{width:100%;padding:.7rem;border-radius:10px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:1rem;text-align:center;margin:.8rem 0}
        .admin-gate input:focus{outline:none;border-color:var(--accent-o)}
        .admin-panel{max-width:600px;margin:0 auto}
        .admin-word{background:var(--bg-card);border-radius:14px;padding:1rem;margin-bottom:.8rem;border:1px solid rgba(255,255,255,.05)}
        .admin-word .aw-head{display:flex;align-items:center;gap:.5rem;margin-bottom:.6rem;font-weight:900;font-size:1rem}
        .admin-word .aw-idx{background:var(--accent-gold);color:#1a1a2e;width:24px;height:24px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:900;flex-shrink:0}
        .admin-word label{display:block;font-size:.7rem;opacity:.4;margin-bottom:.2rem;margin-top:.5rem;font-weight:700}
        .admin-word input,.admin-word textarea{width:100%;padding:.5rem .6rem;border-radius:8px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.85rem;resize:vertical}
        .admin-word input:focus,.admin-word textarea:focus{outline:none;border-color:var(--accent-o)}
        .admin-actions{display:flex;gap:8px;justify-content:center;margin-top:1rem;flex-wrap:wrap;position:sticky;bottom:0;padding:1rem 0;background:var(--bg-dark)}
        .admin-actions .w-btn{padding:.6rem 1.2rem;font-size:.85rem}

        /* ── Fill-in ── */
        .fill-card{background:var(--bg-card);border-radius:20px;padding:1.5rem;box-shadow:0 20px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);text-align:center}
        .fill-illust{width:180px;height:120px;margin:0 auto .5rem;border-radius:10px;overflow:hidden}
        .fill-illust svg{width:100%;height:100%}
        .fill-word{font-size:2.2rem;font-weight:900;margin-bottom:.4rem;letter-spacing:.2em}
        .fill-blank{display:inline-block;width:2.2rem;height:2.2rem;border-bottom:3px solid var(--accent-gold);margin:0 .05rem;vertical-align:bottom}
        .fill-hint{font-size:.75rem;opacity:.45;margin-bottom:.8rem}
        .fill-opts{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:.7rem}
        .fill-opt{width:56px;height:56px;font-size:1.4rem;font-weight:900;font-family:inherit;background:var(--bg-dark);border:2px solid var(--grid-line);border-radius:12px;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
        .fill-opt:hover:not(:disabled){border-color:rgba(255,255,255,.3);transform:scale(1.08)}.fill-opt.correct{border-color:var(--accent-o);background:rgba(78,205,196,.15);color:var(--accent-o)}.fill-opt.wrong{border-color:var(--accent-x);background:rgba(255,107,107,.15);color:var(--accent-x)}.fill-opt:disabled{cursor:default}

        .quiz-card{background:var(--bg-card);border-radius:20px;padding:1.5rem;box-shadow:0 20px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);text-align:center}
        .quiz-illust{width:200px;height:140px;margin:0 auto .5rem;border-radius:12px;overflow:hidden}
        .quiz-illust svg{width:100%;height:100%}
        .quiz-prompt{font-size:1rem;font-weight:700;margin-bottom:1rem}
        .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.7rem}
        .quiz-opt{padding:.65rem;font-size:1rem;font-weight:700;font-family:inherit;background:var(--bg-dark);border:2px solid var(--grid-line);border-radius:12px;color:var(--text);cursor:pointer;transition:all .15s}
        .quiz-opt:hover:not(:disabled){border-color:rgba(255,255,255,.3);transform:scale(1.03)}.quiz-opt.correct{border-color:var(--accent-o);background:rgba(78,205,196,.15);color:var(--accent-o)}.quiz-opt.wrong{border-color:var(--accent-x);background:rgba(255,107,107,.15);color:var(--accent-x)}.quiz-opt:disabled{cursor:default}
        .quiz-score{font-size:.75rem;opacity:.35}
        .q-prog{width:100%;height:5px;background:var(--grid-line);border-radius:3px;margin-bottom:.8rem;overflow:hidden}.q-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent-o),var(--accent-gold));border-radius:3px;transition:width .3s}
    </style>
</head>

<script>
function S(parts){return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160">${parts}</svg>`}
function sky(c1,c2){return `<defs><linearGradient id="sk" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/></linearGradient></defs><rect width="240" height="160" fill="url(#sk)"/>`}
function sun(x,y,r){return `<circle cx="${x}" cy="${y}" r="${r}" fill="#FFD93D" opacity=".9"/><circle cx="${x}" cy="${y}" r="${r*.7}" fill="#FFF3B0"/>`}
function moon(x,y){return `<circle cx="${x}" cy="${y}" r="22" fill="#FFF9C4"/><circle cx="${x+8}" cy="${y-5}" r="18" fill="#1a237e" opacity=".95"/>`}
function cloud(x,y,s){s=s||1;return `<g transform="translate(${x},${y}) scale(${s})"><ellipse cx="0" cy="0" rx="25" ry="14" fill="#fff" opacity=".85"/><ellipse cx="-15" cy="3" rx="16" ry="11" fill="#fff" opacity=".85"/><ellipse cx="15" cy="3" rx="18" ry="12" fill="#fff" opacity=".85"/></g>`}
function ground(c,y){y=y||120;return `<rect x="0" y="${y}" width="240" height="${160-y}" fill="${c}"/>`}
function water(y){y=y||115;return `<rect x="0" y="${y}" width="240" height="${160-y}" fill="#039BE5" opacity=".7"/><path d="M0 ${y+8} Q30 ${y+3} 60 ${y+8} T120 ${y+8} T180 ${y+8} T240 ${y+8}" fill="none" stroke="#4FC3F7" stroke-width="2" opacity=".5"/>`}
function tree(x,y){return `<rect x="${x-3}" y="${y-20}" width="6" height="22" fill="#5D4037" rx="2"/><ellipse cx="${x}" cy="${y-28}" rx="14" ry="16" fill="#4CAF50"/><ellipse cx="${x-8}" cy="${y-22}" rx="10" ry="12" fill="#66BB6A"/>`}
function star(x,y,s){s=s||3;return `<polygon points="${x},${y-s} ${x+s*.4},${y-s*.3} ${x+s},${y-s*.2} ${x+s*.5},${y+s*.2} ${x+s*.7},${y+s} ${x},${y+s*.5} ${x-s*.7},${y+s} ${x-s*.5},${y+s*.2} ${x-s},${y-s*.2} ${x-s*.4},${y-s*.3}" fill="#FFF9C4" opacity=".8"/>`}
function person(x,y,head,body){return `<circle cx="${x}" cy="${y-22}" r="10" fill="${head||'#FFCC80'}"/><rect x="${x-8}" y="${y-12}" width="16" height="20" rx="4" fill="${body||'#42A5F5'}"/><rect x="${x-4}" y="${y+8}" width="3" height="10" rx="1" fill="${head||'#FFCC80'}"/><rect x="${x+1}" y="${y+8}" width="3" height="10" rx="1" fill="${head||'#FFCC80'}"/>`}
function house(x,y,w,h,wallC,roofC){return `<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="${wallC||'#E3F2FD'}" rx="3"/><polygon points="${x-5},${y} ${x+w/2},${y-h*.4} ${x+w+5},${y}" fill="${roofC||'#F44336'}"/>`}
function txt(x,y,t,sz,c){return `<text x="${x}" y="${y}" text-anchor="middle" font-size="${sz||12}" font-weight="700" fill="${c||'#fff'}" font-family="sans-serif">${t}</text>`}
function heart(x,y,s){s=s||1;return `<g transform="translate(${x},${y}) scale(${s})"><path d="M0-6 C-8-16-20-4-10 6L0 14 10 6C20-4 8-16 0-6Z" fill="#EF5350"/></g>`}

const VOCAB=[
{topic:'社區與服務',icon:'🏘️',words:[
{word:'救生員',hint:'在泳池或沙灘保護大家安全的人',sentence:'救生員在沙灘上巡邏，保護游泳的人。',
svg:S(sky('#87CEEB','#E0F7FA')+sun(200,30,20)+water(100)+ground('#F9A825',100)+'<rect x="20" y="75" width="8" height="30" fill="#795548"/><rect x="14" y="70" width="20" height="8" fill="#F44336" rx="2"/>'+person(120,85,'#FFCC80','#F44336')+`<text x="155" y="90" font-size="20">🏊</text><path d="M0 105 Q20 100 40 105 T80 105 T120 105 T160 105 T200 105 T240 105" fill="none" stroke="#4FC3F7" stroke-width="2"/>`)},
{word:'郵差',hint:'每天幫我們送信和包裹的人',sentence:'郵差叔叔每天都準時送信。',
svg:S(sky('#90CAF9','#E3F2FD')+cloud(60,25,.8)+cloud(180,15,.6)+ground('#8BC34A',120)+`<rect x="170" y="85" width="40" height="35" fill="#F5F5F5" rx="3"/><rect x="165" y="80" width="50" height="8" fill="#F44336"/>` +person(80,105,'#FFCC80','#1565C0')+`<rect x="68" y="88" width="12" height="16" fill="#FFF9C4" rx="1"/><circle cx="80" cy="128" r="10" fill="#424242" stroke="#757575" stroke-width="2"/><circle cx="100" cy="128" r="10" fill="#424242" stroke="#757575" stroke-width="2"/><rect x="78" y="118" width="24" height="8" fill="#1565C0" rx="2"/>`)},
{word:'醫院',hint:'看醫生和護士的地方',sentence:'肚子痛的時候要去醫院看醫生。',
svg:S(sky('#90CAF9','#BBDEFB')+cloud(50,20,.7)+ground('#A5D6A7',125)+`<rect x="60" y="55" width="120" height="70" fill="#E3F2FD" rx="4"/><rect x="55" y="48" width="130" height="12" fill="#E8EAF6" rx="3"/><rect x="110" y="70" width="20" height="10" fill="#F44336" rx="2"/><rect x="117" y="63" width="6" height="24" fill="#F44336" rx="1"/><rect x="75" y="95" width="18" height="22" fill="#90CAF9" rx="2"/><rect x="147" y="95" width="18" height="22" fill="#90CAF9" rx="2"/><rect x="105" y="100" width="30" height="25" fill="#8D6E63" rx="2"/>`)},
{word:'圖書館',hint:'可以借書和安靜閱讀的地方',sentence:'我最喜歡去圖書館借故事書。',
svg:S(sky('#FFF8E1','#FFECB3')+ground('#BCAAA4',128)+`<rect x="40" y="50" width="160" height="78" fill="#EFEBE9" rx="4"/><polygon points="30,50 120,15 210,50" fill="#8D6E63"/><rect x="60" y="70" width="22" height="30" fill="#90CAF9" rx="2"/><rect x="109" y="70" width="22" height="30" fill="#90CAF9" rx="2"/><rect x="158" y="70" width="22" height="30" fill="#90CAF9" rx="2"/><rect x="95" y="95" width="50" height="33" fill="#6D4C41" rx="2"/>` +`<rect x="70" y="108" width="12" height="16" fill="#F44336" rx="1"/><rect x="84" y="111" width="12" height="13" fill="#2196F3" rx="1"/><rect x="144" y="108" width="12" height="16" fill="#4CAF50" rx="1"/><rect x="158" y="110" width="12" height="14" fill="#FF9800" rx="1"/>`)},
{word:'街燈',hint:'夜間照亮街道的燈',sentence:'街燈令夜間的街道十分光亮。',
svg:S(sky('#1A237E','#283593')+star(30,20)+star(80,40,2)+star(180,25,2.5)+star(210,50,1.8)+ground('#37474F',125)+`<rect x="118" y="40" width="4" height="90" fill="#78909C"/><ellipse cx="120" cy="38" rx="16" ry="8" fill="#78909C"/><ellipse cx="120" cy="35" rx="10" ry="10" fill="#FFF9C4" opacity=".9"/><ellipse cx="120" cy="35" rx="20" ry="20" fill="#FFF176" opacity=".15"/><ellipse cx="120" cy="35" rx="35" ry="35" fill="#FFF176" opacity=".08"/>` +`<rect x="50" y="95" width="30" height="30" fill="#455A64" rx="2"/><rect x="55" y="100" width="8" height="8" fill="#FFF9C4" opacity=".7" rx="1"/><rect x="67" y="100" width="8" height="8" fill="#FFF9C4" opacity=".5" rx="1"/>`)},

// Load saved edits from localStorage
const STORAGE_KEY='gs_vocab_edits';
function loadEdits(){
    try{const s=localStorage.getItem(STORAGE_KEY);if(!s)return;const edits=JSON.parse(s);
    VOCAB.forEach(t=>{t.words.forEach(w=>{const e=edits[w.word];if(e){if(e.word)w.word=e.word;if(e.hint)w.hint=e.hint;if(e.sentence)w.sentence=e.sentence;}});});
    }catch(e){}
}
loadEdits();

// 2. Writing
let wI=0,wO=[],wR=[];const CVS=140;
function startWrite(){wI=0;wR=[];wO=[...allWords].sort(()=>Math.random()-.5);showW();}
function initBox(cv){
    const cx=cv.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const rect=cv.getBoundingClientRect();
    cv.width=rect.width*dpr;cv.height=rect.height*dpr;
    cx.scale(dpr,dpr);
    cx.lineCap='round';cx.lineJoin='round';cx.lineWidth=3;cx.strokeStyle='#222';let dr=false;
    function gp(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top];}
    cv.onmousedown=e=>{dr=true;const[x,y]=gp(e);cx.beginPath();cx.moveTo(x,y);};
    cv.onmousemove=e=>{if(!dr)return;const[x,y]=gp(e);cx.lineTo(x,y);cx.stroke();};
    cv.onmouseup=cv.onmouseleave=()=>dr=false;
    cv.addEventListener('touchstart',e=>{e.preventDefault();dr=true;const[x,y]=gp(e);cx.beginPath();cx.moveTo(x,y);},{passive:false});
    cv.addEventListener('touchmove',e=>{if(!dr)return;e.preventDefault();const[x,y]=gp(e);cx.lineTo(x,y);cx.stroke();},{passive:false});
    cv.addEventListener('touchend',()=>dr=false);
    return {cx,clear:()=>{cx.clearRect(0,0,rect.width,rect.height);}};
}
function showW(){
    const ct=document.getElementById('panelWrite');
    if(wI>=wO.length)wI=0;
    const w=wO[wI],chars=[...w.word];
    const rows=chars.map((_,i)=>`<div class="char-row"><div class="char-write"><span class="char-write-num">第${i+1}字</span><svg class="char-write-grid" viewBox="0 0 100 100"><line x1="50" y1="0" x2="50" y2="100"/><line x1="0" y1="50" x2="100" y2="50"/><line x1="0" y1="0" x2="100" y2="100"/><line x1="100" y1="0" x2="0" y2="100"/></svg><canvas style="width:100%;height:100%" data-idx="${i}"></canvas></div><div class="char-ref" data-cr="${i}" data-char="${chars[i]}">?</div></div>`).join('');
    const labels=`<div class="char-pair-label"><span>我寫的</span><span>正確答案</span></div>`;
    ct.innerHTML=`<div class="write-card"><div class="write-illust">${w.svg}</div><div class="write-hint">${w.hint}</div><div class="write-prompt">在左邊格子寫出每個字，然後對比答案 ✍️</div>${labels}<div class="char-rows">${rows}</div><div class="write-btns"><button class="w-btn" id="wCl">🗑️ 擦掉重寫</button><button class="w-btn gold" id="wSh">👀 看答案</button><button class="w-btn green" id="wNx" style="display:none">✅ 會寫，下一個</button><button class="w-btn red" id="wRt" style="display:none">❌ 不會，加強練習</button></div><div class="learn-box" id="learnBox"><div class="learn-word">${w.word}</div><div class="learn-hint">${w.hint}</div><div class="learn-sent">「${w.sentence}」</div><div class="learn-tip">💡 多看幾次，記住每個字的寫法！</div></div><div class="write-progress">第${wI+1}/${wO.length}個<div class="write-progress-dots" id="wD"></div></div></div>`;

    const boxes=[];
    requestAnimationFrame(()=>{
        ct.querySelectorAll('.char-write canvas').forEach(cv=>{boxes.push(initBox(cv));});
    });

    document.getElementById('wCl').onclick=()=>boxes.forEach(b=>b.clear());
    document.getElementById('wSh').onclick=()=>{
        ct.querySelectorAll('.char-ref').forEach(r=>{r.textContent=r.dataset.char;r.classList.add('show');});
        document.getElementById('wSh').style.display='none';
        document.getElementById('wNx').style.display='';
        document.getElementById('wRt').style.display='';
    };
    document.getElementById('wNx').onclick=()=>{wR.push(true);wI++;showW();};
    document.getElementById('wRt').onclick=()=>{
        wR.push(false);wO.push(w);
        document.getElementById('learnBox').classList.add('show');
        document.getElementById('wRt').style.display='none';
        document.getElementById('wNx').textContent='➡️ 下一個';
        document.getElementById('wNx').onclick=()=>{wI++;showW();};
    };
    const dots=document.getElementById('wD');const st=Math.max(0,wR.length-19);
    for(let i=st;i<wR.length;i++){const d=document.createElement('div');d.className='w-dot '+(wR[i]?'done':'wrong');dots.appendChild(d);}
    dots.appendChild(Object.assign(document.createElement('div'),{className:'w-dot current'}));
}

// 3. Fill
let fI=0,fS=0,fO=[];
function startFill(){fI=0;fS=0;fO=[...allWords].filter(w=>w.word.length>=2).sort(()=>Math.random()-.5).slice(0,12);showF();}
function showF(){
    const ct=document.getElementById('panelFill');
    if(fI>=fO.length){showFR();return;}
    const w=fO[fI],ch=[...w.word],bi=Math.floor(Math.random()*ch.length),cc=ch[bi];
    const disp=ch.map((c,i)=>i===bi?'<span class="fill-blank"></span>':c).join('');
    const wc=new Set([cc]);const ac=[...new Set(allWords.flatMap(x=>[...x.word]))];
    while(wc.size<4){const r=ac[Math.floor(Math.random()*ac.length)];if(r!==cc)wc.add(r);}
    const opts=[...wc].sort(()=>Math.random()-.5);
    ct.innerHTML=`<div class="fill-card"><div class="q-prog"><div class="q-prog-bar" style="width:${fI/fO.length*100}%"></div></div><div class="fill-illust">${w.svg}</div><div class="fill-hint">${w.hint}</div><div class="fill-word">${disp}</div><div style="font-size:.75rem;opacity:.35;margin-bottom:.7rem">哪個字填入空格？</div><div class="fill-opts" id="fO"></div><div class="quiz-score">第${fI+1}/${fO.length}題 · 答對${fS}</div></div>`;
    const g=document.getElementById('fO');
    opts.forEach(c=>{const b=document.createElement('button');b.className='fill-opt';b.textContent=c;b.onclick=()=>{g.querySelectorAll('.fill-opt').forEach(x=>{x.disabled=true;if(x.textContent===cc)x.classList.add('correct');});if(c===cc){fS++;setTimeout(()=>{fI++;showF();},600);}else{b.classList.add('wrong');const box=document.createElement('div');box.style.cssText='margin-top:1rem;padding:1rem;background:rgba(244,67,54,.1);border:2px solid var(--accent-x);border-radius:12px;text-align:center';box.innerHTML=`<div style="font-size:1.5rem;font-weight:900;color:var(--accent-x);margin-bottom:.3rem">✗ 答錯了</div><div style="font-size:.9rem;margin-bottom:.3rem">正確答案是：<strong style="color:var(--accent-gold);font-size:1.2rem">${cc}</strong>　完整詞語：<strong style="color:var(--accent-gold)">${w.word}</strong></div><div style="font-size:.8rem;opacity:.5;margin-bottom:.6rem">${w.hint}</div><button class="mode-btn active" style="padding:.5rem 1.5rem;font-size:.9rem" onclick="fI++;showF()">明白了，繼續 ➡️</button>`;ct.querySelector('.fill-card,.g-card').appendChild(box);}};g.appendChild(b);});
}
function showFR(){const p=Math.round(fS/fO.length*100),s=p>=90?'⭐⭐⭐':p>=70?'⭐⭐☆':p>=50?'⭐☆☆':'☆☆☆',m=p>=90?'太棒了！🎉':p>=70?'做得不錯！👍':p>=50?'繼續加油！💪':'要多溫習！📖';document.getElementById('panelFill').innerHTML=`<div class="fill-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${m}</div><div style="font-size:2.5rem;margin:.8rem 0">${s}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1rem">答對${fS}/${fO.length}</div><button class="mode-btn active" onclick="startFill()" style="width:100%;padding:.7rem;font-size:.9rem">🔄 再做一次</button></div>`;}

// 4. Quiz
let qI=0,qS=0,qO=[];
function startQuiz(){qI=0;qS=0;qO=[...allWords].sort(()=>Math.random()-.5).slice(0,10);showQ();}
function showQ(){
    const ct=document.getElementById('panelQuiz');
    if(qI>=qO.length){showQR();return;}
    const w=qO[qI],wr=allWords.filter(x=>x.word!==w.word).sort(()=>Math.random()-.5).slice(0,3),opts=[w,...wr].sort(()=>Math.random()-.5);
    ct.innerHTML=`<div class="quiz-card"><div class="q-prog"><div class="q-prog-bar" style="width:${qI/qO.length*100}%"></div></div><div class="quiz-illust">${w.svg}</div><div class="quiz-prompt">以上圖畫代表哪個詞語？</div><div class="quiz-opts" id="qO"></div><div class="quiz-score">第${qI+1}/${qO.length}題 · 答對${qS}</div></div>`;
    const g=document.getElementById('qO');
    opts.forEach(o=>{const b=document.createElement('button');b.className='quiz-opt';b.textContent=o.word;b.onclick=()=>{g.querySelectorAll('.quiz-opt').forEach(x=>{x.disabled=true;if(x.textContent===w.word)x.classList.add('correct');});if(o.word===w.word){qS++;setTimeout(()=>{qI++;showQ();},600);}else{b.classList.add('wrong');const box=document.createElement('div');box.style.cssText='margin-top:1rem;padding:1rem;background:rgba(244,67,54,.1);border:2px solid var(--accent-x);border-radius:12px;text-align:center';box.innerHTML=`<div style="font-size:1.5rem;font-weight:900;color:var(--accent-x);margin-bottom:.3rem">✗ 答錯了</div><div style="font-size:.9rem;margin-bottom:.3rem">正確答案是：<strong style="color:var(--accent-gold);font-size:1.1rem">${w.word}</strong></div><div style="font-size:.8rem;opacity:.5;margin-bottom:.6rem">${w.hint}</div><button class="mode-btn active" style="padding:.5rem 1.5rem;font-size:.9rem" onclick="qI++;showQ()">明白了，繼續 ➡️</button>`;ct.querySelector('.quiz-card').appendChild(box);}};g.appendChild(b);});
}
function showQR(){const p=Math.round(qS/qO.length*100),s=p>=90?'⭐⭐⭐':p>=70?'⭐⭐☆':p>=50?'⭐☆☆':'☆☆☆',m=p>=90?'太棒了！🎉':p>=70?'做得不錯！👍':p>=50?'繼續加油！💪':'要多溫習！📖';document.getElementById('panelQuiz').innerHTML=`<div class="quiz-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${m}</div><div style="font-size:2.5rem;margin:.8rem 0">${s}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1rem">答對${qS}/${qO.length}</div><button class="mode-btn active" onclick="startQuiz()" style="width:100%;padding:.7rem;font-size:.9rem">🔄 再做一次</button></div>`;}

// 5. Admin
function showAdmin(){
    const ct=document.getElementById('panelAdmin');
    if(!adminUnlocked){
        ct.innerHTML=`<div class="admin-gate"><div style="font-size:2rem;margin-bottom:.5rem">🔐</div><div style="font-size:1rem;font-weight:900;margin-bottom:.3rem">管理員登入</div><div style="font-size:.8rem;opacity:.4;margin-bottom:.5rem">請輸入管理密碼</div><input type="password" id="adminPw" placeholder="密碼"><button class="w-btn gold" id="adminLogin" style="width:100%;padding:.6rem">登入</button><div id="adminErr" style="color:var(--accent-x);font-size:.8rem;margin-top:.5rem"></div></div>`;
        document.getElementById('adminPw').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('adminLogin').click();});
        document.getElementById('adminLogin').onclick=()=>{
            if(document.getElementById('adminPw').value===ADMIN_PW){adminUnlocked=true;showAdmin();}
            else document.getElementById('adminErr').textContent='密碼錯誤，請重試。';
        };
        return;
    }
    const words=VOCAB.flatMap(t=>t.words);
    let html='<div class="admin-panel"><div style="text-align:center;margin-bottom:1rem"><div style="font-size:1.2rem;font-weight:900">🔧 詞語管理</div><div style="font-size:.75rem;opacity:.4">修改詞語、解釋和例句後按「儲存」</div></div>';
    words.forEach((w,i)=>{
        html+=`<div class="admin-word"><div class="aw-head"><span class="aw-idx">${i+1}</span><span>${w.word}</span></div><label>詞語</label><input data-i="${i}" data-f="word" value="${w.word}"><label>解釋</label><input data-i="${i}" data-f="hint" value="${w.hint}"><label>例句</label><textarea data-i="${i}" data-f="sentence" rows="2">${w.sentence}</textarea></div>`;
    });
    html+=`<div class="admin-actions"><button class="w-btn green" id="adminSave">💾 儲存修改</button><button class="w-btn" id="adminReset">🔄 還原預設</button><button class="w-btn red" id="adminLogout">🔒 登出</button></div></div>`;
    ct.innerHTML=html;

    document.getElementById('adminSave').onclick=()=>{
        const edits={};
        ct.querySelectorAll('[data-i]').forEach(el=>{
            const i=parseInt(el.dataset.i),f=el.dataset.f,v=el.value.trim();
            const w=words[i];
            if(!edits[w.word])edits[w.word]={};
            edits[w.word][f]=v;
            w[f]=v;
        });
        localStorage.setItem(STORAGE_KEY,JSON.stringify(edits));
        alert('已儲存！重新載入頁面後生效。');
        location.reload();
    };
    document.getElementById('adminReset').onclick=()=>{
        if(confirm('確定要還原所有詞語至預設值嗎？')){localStorage.removeItem(STORAGE_KEY);alert('已還原！');location.reload();}
    };
    document.getElementById('adminLogout').onclick=()=>{adminUnlocked=false;showAdmin();};
}
</script>
</body>
</html>
