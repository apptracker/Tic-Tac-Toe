    <style>
        .gs-title{font-size:1.8rem;font-weight:900;text-align:center;margin-bottom:.2rem;background:linear-gradient(135deg,var(--accent-gold),var(--accent-o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
        .gs-sub{text-align:center;opacity:.5;margin-bottom:1rem;font-size:.8rem}
        .gs-badge{display:inline-block;background:rgba(78,205,196,.12);color:var(--accent-o);font-size:.7rem;font-weight:700;padding:.2rem .6rem;border-radius:8px;margin-bottom:.6rem}
        .mode-bar{display:flex;gap:6px;margin-bottom:1.2rem;flex-wrap:wrap;justify-content:center}
        .mode-btn{padding:.45rem .7rem;border-radius:10px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
        .mode-btn:hover{border-color:rgba(255,255,255,.2)}.mode-btn.active{border-color:var(--accent-o);background:rgba(78,205,196,.1);color:var(--accent-o)}
        .mode-panel{display:none;width:100%;max-width:680px}.mode-panel.active{display:block}
        .topic-section{margin-bottom:1.5rem}.topic-header{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;margin-bottom:.6rem;background:var(--bg-card);border-radius:12px;border:1px solid rgba(255,255,255,.05);font-weight:900;font-size:.9rem}
        .topic-count{margin-left:auto;font-size:.7rem;opacity:.35}
        .cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}

        /* Scene card with 2x2 grid */
        .scene-card{border-radius:16px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative;border:1px solid rgba(255,255,255,.08);background:var(--bg-card)}
        .scene-card:hover{transform:translateY(-3px);box-shadow:0 10px 25px rgba(0,0,0,.4)}
        .scene-card.flipped .sc-front{opacity:0;pointer-events:none}.scene-card.flipped .sc-back{opacity:1;pointer-events:auto}
        .sc-front,.sc-back{transition:opacity .3s}
        .sc-back{position:absolute;inset:0;opacity:0;background:var(--bg-card);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:.8rem;pointer-events:none}

        .sc-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;padding:3px;background:rgba(0,0,0,.2);border-radius:14px 14px 0 0;overflow:hidden}
        .sc-grid svg{display:block;width:100%;height:80px;border-radius:4px}
        .sc-label{padding:.4rem .5rem;text-align:center}
        .sc-word{font-size:1.05rem;font-weight:900}.sc-tap{font-size:.5rem;opacity:.2;margin-top:.1rem}
        .sc-back-word{font-size:1.8rem;font-weight:900;color:var(--accent-gold);letter-spacing:.12em;margin-bottom:.2rem}
        .sc-back-hint{font-size:.7rem;opacity:.5;line-height:1.4;margin-bottom:.2rem}
        .sc-back-sent{font-size:.65rem;opacity:.35;line-height:1.4;font-style:italic}

        /* Shared quiz/game styles */
        .g-card{background:var(--bg-card);border-radius:20px;padding:1.5rem;box-shadow:0 20px 40px rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.05);text-align:center}
        .g-illust{display:grid;grid-template-columns:1fr 1fr;gap:4px;max-width:300px;margin:0 auto .6rem;border-radius:10px;overflow:hidden}
        .g-illust svg{display:block;width:100%;height:75px}
        .g-illust.single{grid-template-columns:1fr}.g-illust.single svg{height:130px}
        .g-hint{font-size:.85rem;font-weight:700;margin-bottom:.5rem;opacity:.7}
        .g-prompt{font-size:.72rem;opacity:.3;margin-bottom:.5rem}
        .q-prog{width:100%;height:5px;background:var(--grid-line);border-radius:3px;margin-bottom:.8rem;overflow:hidden}.q-prog-bar{height:100%;background:linear-gradient(90deg,var(--accent-o),var(--accent-gold));border-radius:3px;transition:width .3s}
        .quiz-opts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.6rem}
        .quiz-opt{padding:.6rem;font-size:1rem;font-weight:700;font-family:inherit;background:var(--bg-dark);border:2px solid var(--grid-line);border-radius:12px;color:var(--text);cursor:pointer;transition:all .15s}
        .quiz-opt:hover:not(:disabled){border-color:rgba(255,255,255,.3);transform:scale(1.03)}.quiz-opt.correct{border-color:var(--accent-o);background:rgba(78,205,196,.15);color:var(--accent-o)}.quiz-opt.wrong{border-color:var(--accent-x);background:rgba(255,107,107,.15);color:var(--accent-x)}.quiz-opt:disabled{cursor:default}
        .quiz-score{font-size:.72rem;opacity:.3}
        .fill-word{font-size:2rem;font-weight:900;margin-bottom:.4rem;letter-spacing:.15em}
        .fill-blank{display:inline-block;width:2rem;height:2rem;border-bottom:3px solid var(--accent-gold);margin:0 .05rem;vertical-align:bottom}
        .fill-opts{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:.6rem}
        .fill-opt{width:50px;height:50px;font-size:1.3rem;font-weight:900;font-family:inherit;background:var(--bg-dark);border:2px solid var(--grid-line);border-radius:12px;color:var(--text);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center}
        .fill-opt:hover:not(:disabled){border-color:rgba(255,255,255,.3);transform:scale(1.08)}.fill-opt.correct{border-color:var(--accent-o);background:rgba(78,205,196,.15);color:var(--accent-o)}.fill-opt.wrong{border-color:var(--accent-x);background:rgba(255,107,107,.15);color:var(--accent-x)}.fill-opt:disabled{cursor:default}
        .canvas-area{position:relative;margin:0 auto .6rem;border-radius:12px;overflow:hidden;border:2px solid var(--grid-line);background:#fff;touch-action:none}
        .canvas-area canvas{display:block;cursor:crosshair}
        .write-btns{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:.5rem}
        .w-btn{padding:.45rem .8rem;border-radius:10px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .15s}
        .w-btn:hover{border-color:rgba(255,255,255,.2)}.w-btn.green{border-color:var(--accent-o);color:var(--accent-o)}.w-btn.red{border-color:var(--accent-x);color:var(--accent-x)}.w-btn.gold{border-color:var(--accent-gold);color:var(--accent-gold)}
        .write-answer{font-size:2.2rem;font-weight:900;color:var(--accent-gold);letter-spacing:.2em;margin:.3rem 0;min-height:2.8rem}
        .w-dots{display:flex;gap:3px;justify-content:center;margin-top:.3rem}.w-dot{width:7px;height:7px;border-radius:50%;background:var(--grid-line)}.w-dot.ok{background:var(--accent-o)}.w-dot.no{background:var(--accent-x)}.w-dot.now{background:var(--accent-gold);box-shadow:0 0 5px var(--accent-gold)}
    </style>

{word:'形狀',hint:'物件嘅外形，例如圓形、正方形',sentence:'唔同嘅 形狀 有唔同嘅名稱。',imgs:[
s(sk('#FFF3E0','#FFE0B2')+`<circle cx="35" cy="35" rx="14" fill="#EF5350" opacity=".8"/><rect x="62" y="22" width="25" height="25" fill="#42A5F5" opacity=".8" rx="2"/>`),
s(sk('#E8F5E9','#C8E6C9')+`<polygon points="60,15 45,50 75,50" fill="#4CAF50" opacity=".8"/><circle cx="35" cy="60" r="10" fill="#FF9800" opacity=".7"/><rect x="75" y="50" width="18" height="18" fill="#9C27B0" opacity=".7" rx="2"/>`),
s(sk('#E3F2FD','#BBDEFB')+`<ellipse cx="60" cy="40" rx="25" ry="15" fill="#FF9800" opacity=".6"/><polygon points="20,60 10,75 30,75" fill="#EF5350" opacity=".7"/><polygon points="95,55 85,75 105,75" fill="#2196F3" opacity=".7"/>`),

s(sk('#E8F5E9','#C8E6C9')+`<rect x="20" y="35" width="80" height="3" fill="#8D6E63" opacity=".4" rx="1"/><rect x="25" y="35" width="4" height="3" fill="#BCAAA4"/><rect x="38" y="35" width="4" height="3" fill="#BCAAA4"/><rect x="51" y="35" width="4" height="3" fill="#BCAAA4"/><rect x="64" y="35" width="4" height="3" fill="#BCAAA4"/><rect x="77" y="35" width="4" height="3" fill="#BCAAA4"/><rect x="90" y="35" width="4" height="3" fill="#BCAAA4"/>`+tr(15,32)+tr(105,33)),
s(sk('#A5D6A7','#81C784')+`<text x="20" y="30" font-size="14" font-family="sans-serif">🧭</text><path d="M45 55Q60 30 80 50Q95 65 110 45" stroke="#FFF" stroke-width="3" fill="none" opacity=".5" stroke-dasharray="4 3"/>`+tr(70,58))]},
];

const allW=W.map(w=>({...w}));

document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{btn.onclick=()=>{document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.classList.remove('active'));btn.classList.add('active');document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));const m=btn.dataset.mode;document.getElementById({cards:'pCards',write:'pWrite',fill:'pFill',quiz:'pQuiz'}[m]).classList.add('active');if(m==='write')startW();if(m==='fill')startF();if(m==='quiz')startQ();}});

// 1. Cards
(function(){
const ct=document.getElementById('pCards');
const sec=document.createElement('div');sec.className='topic-section';
sec.innerHTML=`<div class="topic-header"><span style="font-size:1.2rem">📖</span>常識詞語<span class="topic-count">${W.length} 個</span></div>`;
const grid=document.createElement('div');grid.className='cards-grid';
W.forEach(w=>{const c=document.createElement('div');c.className='scene-card';
c.innerHTML=`<div class="sc-front"><div class="sc-grid">${w.imgs.map(i=>i).join('')}</div><div class="sc-label"><div class="sc-word">${w.word}</div><div class="sc-tap">👆 翻轉</div></div></div><div class="sc-back"><div class="sc-back-word">${w.word}</div><div class="sc-back-hint">${w.hint}</div><div class="sc-back-sent">「${w.sentence}」</div></div>`;
c.onclick=()=>c.classList.toggle('flipped');grid.appendChild(c);});
sec.appendChild(grid);ct.appendChild(sec);})();

// 2. Write
let wI=0,wO=[],wR=[];const CW=280,CH=180;
function startW(){wI=0;wR=[];wO=[...allW].sort(()=>Math.random()-.5);showWr();}
function showWr(){const ct=document.getElementById('pWrite');if(wI>=wO.length)wI=0;const w=wO[wI];
ct.innerHTML=`<div class="g-card"><div class="g-illust">${w.imgs.map(i=>i).join('')}</div><div class="g-hint">${w.hint}</div><div class="g-prompt">請喺下面寫出呢個詞語 ✍️</div><div class="canvas-area" style="width:${CW}px;height:${CH}px;margin:0 auto .6rem"><canvas id="wC" width="${CW}" height="${CH}"></canvas></div><div class="write-btns"><button class="w-btn" id="wCl">🗑️ 擦掉</button><button class="w-btn gold" id="wSh">👀 睇答案</button><button class="w-btn green" id="wNx" style="display:none">✅ 識寫</button><button class="w-btn red" id="wRt" style="display:none">❌ 再練</button></div><div class="write-answer" id="wAn"></div><div style="font-size:.7rem;opacity:.3;text-align:center">第${wI+1}/${wO.length}個</div><div class="w-dots" id="wD"></div></div>`;
const cv=document.getElementById('wC'),cx=cv.getContext('2d');cx.lineCap='round';cx.lineJoin='round';cx.lineWidth=4;cx.strokeStyle='#333';let dr=false;
function gp(e){const r=cv.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return[t.clientX-r.left,t.clientY-r.top]}
cv.onmousedown=e=>{dr=true;const[x,y]=gp(e);cx.beginPath();cx.moveTo(x,y)};cv.onmousemove=e=>{if(!dr)return;const[x,y]=gp(e);cx.lineTo(x,y);cx.stroke()};cv.onmouseup=cv.onmouseleave=()=>dr=false;
cv.addEventListener('touchstart',e=>{e.preventDefault();dr=true;const[x,y]=gp(e);cx.beginPath();cx.moveTo(x,y)},{passive:false});cv.addEventListener('touchmove',e=>{if(!dr)return;e.preventDefault();const[x,y]=gp(e);cx.lineTo(x,y);cx.stroke()},{passive:false});cv.addEventListener('touchend',()=>dr=false);
document.getElementById('wCl').onclick=()=>cx.clearRect(0,0,CW,CH);
document.getElementById('wSh').onclick=()=>{document.getElementById('wAn').textContent=w.word;document.getElementById('wSh').style.display='none';document.getElementById('wNx').style.display='';document.getElementById('wRt').style.display='';};
document.getElementById('wNx').onclick=()=>{wR.push(true);wI++;showWr();};
document.getElementById('wRt').onclick=()=>{wR.push(false);wO.push(w);wI++;showWr();};
const dots=document.getElementById('wD');for(let i=Math.max(0,wR.length-19);i<wR.length;i++){const d=document.createElement('div');d.className='w-dot '+(wR[i]?'ok':'no');dots.appendChild(d);}const cu=document.createElement('div');cu.className='w-dot now';dots.appendChild(cu);}

// 3. Fill
let fI=0,fS=0,fO=[];
function startF(){fI=0;fS=0;fO=[...allW].filter(w=>w.word.length>=2).sort(()=>Math.random()-.5).slice(0,12);showFl();}
function showFl(){const ct=document.getElementById('pFill');if(fI>=fO.length){showFR();return;}const w=fO[fI],ch=[...w.word],bi=Math.floor(Math.random()*ch.length),cc=ch[bi];
const disp=ch.map((c,i)=>i===bi?'<span class="fill-blank"></span>':c).join('');
const wc=new Set([cc]);const ac=[...new Set(allW.flatMap(x=>[...x.word]))];while(wc.size<4){const r=ac[Math.floor(Math.random()*ac.length)];if(r!==cc)wc.add(r);}const opts=[...wc].sort(()=>Math.random()-.5);
ct.innerHTML=`<div class="g-card"><div class="q-prog"><div class="q-prog-bar" style="width:${fI/fO.length*100}%"></div></div><div class="g-illust">${w.imgs.slice(0,2).join('')}</div><div class="g-hint" style="font-size:.78rem">${w.hint}</div><div class="fill-word">${disp}</div><div class="g-prompt">邊個字填入空格？</div><div class="fill-opts" id="fO"></div><div class="quiz-score">第${fI+1}/${fO.length}題·答對${fS}</div></div>`;
const g=document.getElementById('fO');opts.forEach(c=>{const b=document.createElement('button');b.className='fill-opt';b.textContent=c;b.onclick=()=>{g.querySelectorAll('.fill-opt').forEach(x=>{x.disabled=true;if(x.textContent===cc)x.classList.add('correct');});if(c===cc)fS++;else b.classList.add('wrong');setTimeout(()=>{fI++;showFl();},700);};g.appendChild(b);});}
function showFR(){const p=Math.round(fS/fO.length*100),st=p>=90?'⭐⭐⭐':p>=70?'⭐⭐☆':p>=50?'⭐☆☆':'☆☆☆',m=p>=90?'太叻喇！🎉':p>=70?'做得唔錯！👍':p>=50?'繼續加油！💪':'要多啲溫習📖';document.getElementById('pFill').innerHTML=`<div class="g-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${m}</div><div style="font-size:2.5rem;margin:.8rem 0">${st}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1rem">答對${fS}/${fO.length}</div><button class="mode-btn active" onclick="startF()" style="width:100%;padding:.7rem;font-size:.9rem">🔄 再做一次</button></div>`;}

// 4. Quiz
let qI=0,qS=0,qO=[];
function startQ(){qI=0;qS=0;qO=[...allW].sort(()=>Math.random()-.5).slice(0,10);showQz();}
function showQz(){const ct=document.getElementById('pQuiz');if(qI>=qO.length){showQR();return;}const w=qO[qI],wr=allW.filter(x=>x.word!==w.word).sort(()=>Math.random()-.5).slice(0,3),opts=[w,...wr].sort(()=>Math.random()-.5);
ct.innerHTML=`<div class="g-card"><div class="q-prog"><div class="q-prog-bar" style="width:${qI/qO.length*100}%"></div></div><div class="g-illust">${w.imgs.map(i=>i).join('')}</div><div class="quiz-prompt" style="margin-top:.5rem">以上圖畫代表邊個詞語？</div><div class="quiz-opts" id="qO"></div><div class="quiz-score">第${qI+1}/${qO.length}題·答對${qS}</div></div>`;
const g=document.getElementById('qO');opts.forEach(o=>{const b=document.createElement('button');b.className='quiz-opt';b.textContent=o.word;b.onclick=()=>{g.querySelectorAll('.quiz-opt').forEach(x=>{x.disabled=true;if(x.textContent===w.word)x.classList.add('correct');});if(o.word===w.word)qS++;else b.classList.add('wrong');setTimeout(()=>{qI++;showQz();},700);};g.appendChild(b);});}
function showQR(){const p=Math.round(qS/qO.length*100),st=p>=90?'⭐⭐⭐':p>=70?'⭐⭐☆':p>=50?'⭐☆☆':'☆☆☆',m=p>=90?'太叻喇！🎉':p>=70?'做得唔錯！👍':p>=50?'繼續加油！💪':'要多啲溫習📖';document.getElementById('pQuiz').innerHTML=`<div class="g-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${m}</div><div style="font-size:2.5rem;margin:.8rem 0">${st}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1rem">答對${qS}/${qO.length}</div><button class="mode-btn active" onclick="startQ()" style="width:100%;padding:.7rem;font-size:.9rem">🔄 再做一次</button></div>`;}
</script>
</body>
