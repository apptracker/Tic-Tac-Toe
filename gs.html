<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>常識溫習</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="nav.css">
    <style>
        .gs-title { font-size:1.8rem; font-weight:900; text-align:center; margin-bottom:.3rem; background:linear-gradient(135deg,var(--accent-gold),var(--accent-o)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .gs-sub { text-align:center; opacity:.5; margin-bottom:1.2rem; font-size:.85rem; }
        .gs-badge { display:inline-block; background:rgba(78,205,196,.12); color:var(--accent-o); font-size:.7rem; font-weight:700; padding:.2rem .6rem; border-radius:8px; margin-bottom:.8rem; }

        /* Mode bar */
        .mode-bar { display:flex; gap:6px; margin-bottom:1.5rem; flex-wrap:wrap; justify-content:center; }
        .mode-btn { padding:.5rem .8rem; border-radius:10px; border:2px solid var(--grid-line); background:var(--bg-dark); color:var(--text); font-family:inherit; font-size:.8rem; font-weight:700; cursor:pointer; transition:all .15s; }
        .mode-btn:hover { border-color:rgba(255,255,255,.2); }
        .mode-btn.active { border-color:var(--accent-o); background:rgba(78,205,196,.1); color:var(--accent-o); }

        .mode-panel { display:none; width:100%; max-width:560px; }
        .mode-panel.active { display:block; }

        /* ── Cards ── */
        .topic-section { margin-bottom:1.5rem; }
        .topic-header { display:flex; align-items:center; gap:.5rem; padding:.5rem .8rem; margin-bottom:.6rem; background:var(--bg-card); border-radius:12px; border:1px solid rgba(255,255,255,.05); font-weight:900; font-size:.9rem; }
        .topic-icon { font-size:1.2rem; }
        .topic-count { margin-left:auto; font-size:.7rem; opacity:.35; }

        .cards-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:8px; }
        .vocab-card { background:var(--bg-card); border:1px solid rgba(255,255,255,.05); border-radius:14px; padding:.8rem .6rem; text-align:center; cursor:pointer; transition:all .2s; position:relative; overflow:hidden; min-height:150px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
        .vocab-card:hover { transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,0,0,.3); }
        .vocab-card.flipped .c-front { opacity:0; transform:scale(.8); }
        .vocab-card.flipped .c-back { opacity:1; transform:scale(1); }
        .c-front,.c-back { transition:all .3s; }
        .c-back { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:.7rem; opacity:0; transform:scale(1.1); background:var(--bg-card); border-radius:14px; }
        .c-scene { font-size:2.5rem; margin-bottom:.3rem; line-height:1.2; }
        .c-word { font-size:1.15rem; font-weight:900; }
        .c-word-big { font-size:1.8rem; font-weight:900; letter-spacing:.15em; color:var(--accent-gold); }
        .c-hint { font-size:.72rem; opacity:.55; margin-top:.3rem; line-height:1.4; }
        .c-tap { font-size:.55rem; opacity:.2; margin-top:.4rem; }
        .c-sentence { font-size:.7rem; opacity:.5; margin-top:.4rem; line-height:1.4; font-style:italic; }

        /* ── Writing Practice ── */
        .write-card { background:var(--bg-card); border-radius:20px; padding:1.5rem; box-shadow:0 20px 40px rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.05); text-align:center; }
        .write-scene { font-size:3.5rem; margin-bottom:.3rem; }
        .write-hint { font-size:.95rem; font-weight:700; margin-bottom:.8rem; opacity:.7; }
        .write-prompt { font-size:.8rem; opacity:.4; margin-bottom:.8rem; }

        .canvas-area { position:relative; margin:0 auto .8rem; border-radius:14px; overflow:hidden; border:2px solid var(--grid-line); background:#fff; touch-action:none; }
        .canvas-area canvas { display:block; cursor:crosshair; }
        .canvas-guide { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:5rem; color:rgba(0,0,0,.06); font-weight:900; pointer-events:none; font-family:'Noto Sans TC',sans-serif; }

        .write-btns { display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:.8rem; }
        .w-btn { padding:.5rem 1rem; border-radius:10px; border:2px solid var(--grid-line); background:var(--bg-dark); color:var(--text); font-family:inherit; font-size:.8rem; font-weight:700; cursor:pointer; transition:all .15s; }
        .w-btn:hover { border-color:rgba(255,255,255,.2); }
        .w-btn.green { border-color:var(--accent-o); color:var(--accent-o); }
        .w-btn.red { border-color:var(--accent-x); color:var(--accent-x); }
        .w-btn.gold { border-color:var(--accent-gold); color:var(--accent-gold); }

        .write-answer { font-size:2.5rem; font-weight:900; color:var(--accent-gold); letter-spacing:.2em; margin:.5rem 0; min-height:3rem; }
        .write-progress { display:flex; align-items:center; justify-content:center; gap:.5rem; font-size:.75rem; opacity:.4; margin-top:.5rem; }
        .write-progress-dots { display:flex; gap:4px; }
        .w-dot { width:8px; height:8px; border-radius:50%; background:var(--grid-line); }
        .w-dot.done { background:var(--accent-o); }
        .w-dot.wrong { background:var(--accent-x); }
        .w-dot.current { background:var(--accent-gold); box-shadow:0 0 6px var(--accent-gold); }

        /* ── Fill-in ── */
        .fill-card { background:var(--bg-card); border-radius:20px; padding:1.5rem; box-shadow:0 20px 40px rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.05); text-align:center; }
        .fill-scene { font-size:3rem; margin-bottom:.5rem; }
        .fill-word { font-size:2.2rem; font-weight:900; margin-bottom:.5rem; letter-spacing:.2em; }
        .fill-blank { display:inline-block; width:2.2rem; height:2.2rem; border-bottom:3px solid var(--accent-gold); margin:0 .1rem; vertical-align:bottom; }
        .fill-hint { font-size:.8rem; opacity:.5; margin-bottom:1rem; }
        .fill-opts { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:.8rem; }
        .fill-opt { width:56px; height:56px; font-size:1.4rem; font-weight:900; font-family:inherit; background:var(--bg-dark); border:2px solid var(--grid-line); border-radius:12px; color:var(--text); cursor:pointer; transition:all .15s; display:flex; align-items:center; justify-content:center; }
        .fill-opt:hover:not(:disabled) { border-color:rgba(255,255,255,.3); transform:scale(1.08); }
        .fill-opt.correct { border-color:var(--accent-o); background:rgba(78,205,196,.15); color:var(--accent-o); }
        .fill-opt.wrong { border-color:var(--accent-x); background:rgba(255,107,107,.15); color:var(--accent-x); }
        .fill-opt:disabled { cursor:default; }

        /* ── Quiz (emoji→word) ── */
        .quiz-card { background:var(--bg-card); border-radius:20px; padding:1.5rem; box-shadow:0 20px 40px rgba(0,0,0,.4); border:1px solid rgba(255,255,255,.05); text-align:center; }
        .quiz-q { font-size:3rem; margin-bottom:.3rem; }
        .quiz-prompt { font-size:1rem; font-weight:700; margin-bottom:1rem; }
        .quiz-opts { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:.8rem; }
        .quiz-opt { padding:.7rem; font-size:1rem; font-weight:700; font-family:inherit; background:var(--bg-dark); border:2px solid var(--grid-line); border-radius:12px; color:var(--text); cursor:pointer; transition:all .15s; }
        .quiz-opt:hover:not(:disabled) { border-color:rgba(255,255,255,.3); transform:scale(1.03); }
        .quiz-opt.correct { border-color:var(--accent-o); background:rgba(78,205,196,.15); color:var(--accent-o); }
        .quiz-opt.wrong { border-color:var(--accent-x); background:rgba(255,107,107,.15); color:var(--accent-x); }
        .quiz-opt:disabled { cursor:default; }
        .quiz-score { font-size:.8rem; opacity:.4; }
        .q-prog { width:100%; height:5px; background:var(--grid-line); border-radius:3px; margin-bottom:1rem; overflow:hidden; }
        .q-prog-bar { height:100%; background:linear-gradient(90deg,var(--accent-o),var(--accent-gold)); border-radius:3px; transition:width .3s; }
    </style>
</head>
<body>

    </nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="topbar"><button class="hamburger" id="menuOpen">☰</button><span class="topbar-title">AppTracker</span></div>

    <div class="main-content">
        <div class="gs-badge">2C 班 · 常識卷 · 重點溫習</div>
        <div class="gs-title">📖 常識溫習詞語</div>
        <div class="gs-sub">睇圖識字 · 寫字練習 · 填字遊戲 · 小測驗</div>

        <div class="mode-bar">
            <button class="mode-btn active" data-mode="cards">🖼️ 圖像記憶</button>
            <button class="mode-btn" data-mode="write">✍️ 寫字練習</button>
            <button class="mode-btn" data-mode="fill">🧩 填字遊戲</button>
            <button class="mode-btn" data-mode="quiz">🧠 小測驗</button>
        </div>

        <div class="mode-panel active" id="panelCards"></div>
        <div class="mode-panel" id="panelWrite"></div>
        <div class="mode-panel" id="panelFill"></div>
        <div class="mode-panel" id="panelQuiz"></div>
    </div>

    <script src="nav.js"></script>
    <script>
    const VOCAB = [
        { topic:'社區與服務', icon:'🏘️', words:[
            { word:'救生員', scene:'🏊‍♂️🏖️🚨', hint:'喺泳池或沙灘保護大家安全嘅人', sentence:'救生員 喺沙灘上巡邏，保護游泳嘅人。' },
            { word:'郵差', scene:'📮✉️🚴', hint:'每日幫我哋送信同包裹', sentence:'郵差 叔叔每日都準時送信。' },
            { word:'醫院', scene:'🏥👨‍⚕️💊', hint:'睇醫生同護士嘅地方', sentence:'肚痛嘅時候要去 醫院 睇醫生。' },
            { word:'圖書館', scene:'📚🏛️🤫', hint:'可以借書同安靜閱讀嘅地方', sentence:'我最鍾意去 圖書館 借故事書。' },
            { word:'街燈', scene:'🔦🌃🛣️', hint:'夜晚照亮街道嘅燈', sentence:'街燈 令到夜晚嘅街道好光亮。' },
            { word:'服務', scene:'🤝💼😊', hint:'幫助其他人嘅行為', sentence:'義工用 服務 精神幫助有需要嘅人。' },
            { word:'新界', scene:'🗺️🏔️🌳', hint:'香港三大區域之一', sentence:'新界 有好多農田同郊野公園。' },
        ]},
        { topic:'大自然', icon:'🌿', words:[
            { word:'海星', scene:'⭐🌊🐚', hint:'住喺海底，有五隻腳嘅動物', sentence:'海星 有五隻腳，住喺海底石頭上。' },
            { word:'太陽', scene:'☀️🌅🔥', hint:'日頭發光發熱嘅恆星', sentence:'太陽 每日從東邊升起。' },
            { word:'月亮', scene:'🌙✨🌌', hint:'夜晚喺天空嘅衛星', sentence:'中秋節嘅 月亮 又圓又光。' },
            { word:'益蟲', scene:'🐞🐝🌸', hint:'對農作物有益嘅昆蟲，例如蜜蜂、瓢蟲', sentence:'蜜蜂係 益蟲，幫花朵傳播花粉。' },
            { word:'寄居蟹', scene:'🦀🐚🏠', hint:'借其他貝殼嚟住嘅蟹', sentence:'寄居蟹 搵到大啲嘅殼就會搬屋。' },
            { word:'農曆十五', scene:'🌕🏮🥮', hint:'月圓之夜，中秋節就係農曆八月十五', sentence:'農曆十五 嘅月亮最圓最光。' },
        ]},
        { topic:'品德與相處', icon:'💝', words:[
            { word:'愛護', scene:'🫶🌱🐾', hint:'愛惜同保護身邊嘅人同事物', sentence:'我哋要 愛護 大自然同小動物。' },
            { word:'守時', scene:'⏰✅👍', hint:'準時赴約，唔好遲到', sentence:'守時 係一個好重要嘅品德。' },
            { word:'清潔', scene:'🧹✨🧼', hint:'保持乾淨整齊', sentence:'飯後要幫手做 清潔 工作。' },
            { word:'和睦', scene:'🤝👨‍👩‍👧‍👦❤️', hint:'大家和平友善咁相處', sentence:'我哋一家人相處得好 和睦。' },
            { word:'相處', scene:'👫🗣️😊', hint:'同其他人一齊生活同交流', sentence:'同學之間要友善 相處。' },
            { word:'寧靜', scene:'🤫📖🍃', hint:'安安靜靜，冇嘈音', sentence:'圖書館入面要保持 寧靜。' },
            { word:'傷害', scene:'⚠️😢💔', hint:'令人受傷或者唔開心', sentence:'唔好用說話 傷害 其他人。' },
        ]},
        { topic:'日常活動', icon:'🎯', words:[
            { word:'游泳', scene:'🏊‍♀️🏖️💦', hint:'喺水入面運動', sentence:'夏天我成日去 游泳 消暑。' },
            { word:'休息', scene:'😴🛏️💤', hint:'攰咗就要瞓覺或者放鬆', sentence:'做完功課之後要 休息 一下。' },
            { word:'溫習', scene:'📖✏️💡', hint:'重新睇返學過嘅嘢', sentence:'考試之前要認真 溫習。' },
            { word:'康樂文娛', scene:'🎭🎨🎵', hint:'有益身心嘅娛樂活動', sentence:'學校有 康樂文娛 委員會搞活動。' },
            { word:'友好', scene:'😊🤗👋', hint:'對人友善同親切', sentence:'新同學來到，大家要 友好 對待佢。' },
        ]},
        { topic:'形容與概念', icon:'🔷', words:[
            { word:'形狀', scene:'🔷⭕🔺', hint:'物件嘅外形，例如圓形、正方形', sentence:'唔同嘅 形狀 有唔同嘅名稱。' },
            { word:'引路徑', scene:'🛤️🧭🌲', hint:'帶路嘅小路', sentence:'公園入面有 引路徑 帶你去湖邊。' },
        ]},
    ];

    const allWords = VOCAB.flatMap(t => t.words.map(w=>({...w, topic:t.topic, topicIcon:t.icon})));

    // ── Mode switching ──
    document.querySelectorAll('.mode-btn[data-mode]').forEach(btn=>{
        btn.onclick=()=>{
            document.querySelectorAll('.mode-btn[data-mode]').forEach(b=>b.classList.remove('active'));
            btn.classList.add('active');
            document.querySelectorAll('.mode-panel').forEach(p=>p.classList.remove('active'));
            const m=btn.dataset.mode;
            document.getElementById({cards:'panelCards',write:'panelWrite',fill:'panelFill',quiz:'panelQuiz'}[m]).classList.add('active');
            if(m==='write') startWrite();
            if(m==='fill') startFill();
            if(m==='quiz') startQuiz();
        };
    });

    // ═══════════════════════════════════
    // 1. 圖像記憶 Cards
    // ═══════════════════════════════════
    (function buildCards(){
        const ct=document.getElementById('panelCards');
        VOCAB.forEach(t=>{
            const sec=document.createElement('div'); sec.className='topic-section';
            sec.innerHTML=`<div class="topic-header"><span class="topic-icon">${t.icon}</span>${t.topic}<span class="topic-count">${t.words.length} 個</span></div>`;
            const grid=document.createElement('div'); grid.className='cards-grid';
            t.words.forEach(w=>{
                const c=document.createElement('div'); c.className='vocab-card';
                c.innerHTML=`<div class="c-front"><div class="c-scene">${w.scene}</div><div class="c-word">${w.word}</div><div class="c-tap">👆 翻轉</div></div><div class="c-back"><div class="c-word-big">${w.word}</div><div class="c-hint">${w.hint}</div><div class="c-sentence">「${w.sentence}」</div></div>`;
                c.onclick=()=>c.classList.toggle('flipped');
                grid.appendChild(c);
            });
            sec.appendChild(grid); ct.appendChild(sec);
        });
    })();

    // ═══════════════════════════════════
    // 2. 寫字練習 Writing Practice
    // ═══════════════════════════════════
    let wIdx=0, wOrder=[], wResults=[];
    const CANVAS_W=280, CANVAS_H=200;

    function startWrite(){
        wIdx=0; wResults=[];
        wOrder=[...allWords].sort(()=>Math.random()-.5);
        showWriteQ();
    }

    function showWriteQ(){
        const ct=document.getElementById('panelWrite');
        if(wIdx>=wOrder.length){ wIdx=0; } // loop
        const w=wOrder[wIdx];
        ct.innerHTML=`
        <div class="write-card">
            <div class="write-scene">${w.scene}</div>
            <div class="write-hint">${w.hint}</div>
            <div class="write-prompt">請喺下面寫出呢個詞語 ✍️</div>
            <div class="canvas-area" style="width:${CANVAS_W}px;height:${CANVAS_H}px;margin:0 auto .8rem">
                <canvas id="wCanvas" width="${CANVAS_W}" height="${CANVAS_H}"></canvas>
                <div class="canvas-guide" id="wGuide"></div>
            </div>
            <div class="write-btns">
                <button class="w-btn" id="wClear">🗑️ 擦掉</button>
                <button class="w-btn gold" id="wShow">👀 睇答案</button>
                <button class="w-btn green" id="wNext" style="display:none">✅ 識寫，下一個</button>
                <button class="w-btn red" id="wRetry" style="display:none">❌ 唔識，再練</button>
            </div>
            <div class="write-answer" id="wAnswer"></div>
            <div class="write-progress">
                第 ${wIdx+1} / ${wOrder.length} 個
                <div class="write-progress-dots" id="wDots"></div>
            </div>
        </div>`;

        // Canvas drawing
        const canvas=document.getElementById('wCanvas');
        const ctx=canvas.getContext('2d');
        ctx.lineCap='round'; ctx.lineJoin='round'; ctx.lineWidth=4; ctx.strokeStyle='#333';
        let drawing=false;

        function getPos(e){
            const r=canvas.getBoundingClientRect();
            const t=e.touches?e.touches[0]:e;
            return [t.clientX-r.left, t.clientY-r.top];
        }
        function onDown(e){ e.preventDefault(); drawing=true; const [x,y]=getPos(e); ctx.beginPath(); ctx.moveTo(x,y); }
        function onMove(e){ if(!drawing) return; e.preventDefault(); const [x,y]=getPos(e); ctx.lineTo(x,y); ctx.stroke(); }
        function onUp(){ drawing=false; }

        canvas.addEventListener('mousedown',onDown);
        canvas.addEventListener('mousemove',onMove);
        canvas.addEventListener('mouseup',onUp);
        canvas.addEventListener('mouseleave',onUp);
        canvas.addEventListener('touchstart',onDown,{passive:false});
        canvas.addEventListener('touchmove',onMove,{passive:false});
        canvas.addEventListener('touchend',onUp);

        document.getElementById('wClear').onclick=()=>{ctx.clearRect(0,0,CANVAS_W,CANVAS_H);};

        document.getElementById('wShow').onclick=()=>{
            document.getElementById('wAnswer').textContent=w.word;
            document.getElementById('wShow').style.display='none';
            document.getElementById('wNext').style.display='';
            document.getElementById('wRetry').style.display='';
        };
        document.getElementById('wNext').onclick=()=>{ wResults.push(true); wIdx++; showWriteQ(); };
        document.getElementById('wRetry').onclick=()=>{
            wResults.push(false);
            wOrder.push(w);
            wIdx++; showWriteQ();
        };

        // Progress dots
        const dots=document.getElementById('wDots');
        const showCount=Math.min(wResults.length+1, 20);
        const start=Math.max(0, wResults.length-19);
        for(let i=start;i<wResults.length;i++){
            const d=document.createElement('div');
            d.className='w-dot '+(wResults[i]?'done':'wrong');
            dots.appendChild(d);
        }
        const cur=document.createElement('div');
        cur.className='w-dot current'; dots.appendChild(cur);
    }

    // ═══════════════════════════════════
    // 3. 填字遊戲 Fill-in-the-blank
    // ═══════════════════════════════════
    let fIdx=0, fScore=0, fOrder=[];

    function startFill(){
        fIdx=0; fScore=0;
        fOrder=[...allWords].filter(w=>w.word.length>=2).sort(()=>Math.random()-.5).slice(0,12);
        showFillQ();
    }

    function showFillQ(){
        const ct=document.getElementById('panelFill');
        if(fIdx>=fOrder.length){ showFillResult(); return; }
        const w=fOrder[fIdx];
        const chars=[...w.word];
        const blankIdx=Math.floor(Math.random()*chars.length);
        const correctChar=chars[blankIdx];

        const display=chars.map((c,i)=> i===blankIdx ? '<span class="fill-blank"></span>' : c ).join('');

        const wrongChars=new Set([correctChar]);
        const allChars=[...new Set(allWords.flatMap(x=>[...x.word]))];
        while(wrongChars.size<4){
            const rc=allChars[Math.floor(Math.random()*allChars.length)];
            if(rc!==correctChar) wrongChars.add(rc);
        }
        const opts=[...wrongChars].sort(()=>Math.random()-.5);

        ct.innerHTML=`
        <div class="fill-card">
            <div class="q-prog"><div class="q-prog-bar" style="width:${fIdx/fOrder.length*100}%"></div></div>
            <div class="fill-scene">${w.scene}</div>
            <div class="fill-hint">${w.hint}</div>
            <div class="fill-word">${display}</div>
            <div style="font-size:.8rem;opacity:.4;margin-bottom:1rem">邊個字填入空格？</div>
            <div class="fill-opts" id="fOpts"></div>
            <div class="quiz-score">第 ${fIdx+1}/${fOrder.length} 題 · 答對 ${fScore}</div>
        </div>`;

        const grid=document.getElementById('fOpts');
        opts.forEach(ch=>{
            const btn=document.createElement('button');
            btn.className='fill-opt'; btn.textContent=ch;
            btn.onclick=()=>{
                grid.querySelectorAll('.fill-opt').forEach(b=>{b.disabled=true; if(b.textContent===correctChar)b.classList.add('correct');});
                if(ch===correctChar) fScore++;
                else btn.classList.add('wrong');
                setTimeout(()=>{fIdx++; showFillQ();},800);
            };
            grid.appendChild(btn);
        });
    }

    function showFillResult(){
        const pct=Math.round(fScore/fOrder.length*100);
        const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐☆':pct>=50?'⭐☆☆':'☆☆☆';
        const msg=pct>=90?'太叻喇！🎉':pct>=70?'做得唔錯！👍':pct>=50?'繼續加油！💪':'要多啲溫習啊！📖';
        document.getElementById('panelFill').innerHTML=`<div class="fill-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${msg}</div><div style="font-size:2.5rem;margin:.8rem 0">${stars}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1.2rem">答對 ${fScore} / ${fOrder.length}</div><button class="mode-btn active" onclick="startFill()" style="width:100%;padding:.7rem;font-size:.95rem">🔄 再做一次</button></div>`;
    }

    // ═══════════════════════════════════
    // 4. 小測驗 Quiz (emoji→word)
    // ═══════════════════════════════════
    let qIdx=0, qScore=0, qOrder=[];

    function startQuiz(){
        qIdx=0; qScore=0;
        qOrder=[...allWords].sort(()=>Math.random()-.5).slice(0,10);
        showQuizQ();
    }

    function showQuizQ(){
        const ct=document.getElementById('panelQuiz');
        if(qIdx>=qOrder.length){ showQuizResult(); return; }
        const w=qOrder[qIdx];
        const wrongs=allWords.filter(x=>x.word!==w.word).sort(()=>Math.random()-.5).slice(0,3);
        const opts=[w,...wrongs].sort(()=>Math.random()-.5);
        ct.innerHTML=`<div class="quiz-card"><div class="q-prog"><div class="q-prog-bar" style="width:${qIdx/qOrder.length*100}%"></div></div><div class="quiz-q">${w.scene}</div><div class="quiz-prompt">以上圖畫代表邊個詞語？</div><div class="quiz-opts" id="qOpts"></div><div class="quiz-score">第 ${qIdx+1}/${qOrder.length} 題 · 答對 ${qScore}</div></div>`;
        const grid=document.getElementById('qOpts');
        opts.forEach(o=>{
            const btn=document.createElement('button');
            btn.className='quiz-opt'; btn.textContent=o.word;
            btn.onclick=()=>{
                grid.querySelectorAll('.quiz-opt').forEach(b=>{b.disabled=true; if(b.textContent===w.word)b.classList.add('correct');});
                if(o.word===w.word) qScore++;
                else btn.classList.add('wrong');
                setTimeout(()=>{qIdx++; showQuizQ();},800);
            };
            grid.appendChild(btn);
        });
    }

    function showQuizResult(){
        const pct=Math.round(qScore/qOrder.length*100);
        const stars=pct>=90?'⭐⭐⭐':pct>=70?'⭐⭐☆':pct>=50?'⭐☆☆':'☆☆☆';
        const msg=pct>=90?'太叻喇！🎉':pct>=70?'做得唔錯！👍':pct>=50?'繼續加油！💪':'要多啲溫習啊！📖';
        document.getElementById('panelQuiz').innerHTML=`<div class="quiz-card"><div style="font-size:1.8rem;margin-bottom:.5rem">${msg}</div><div style="font-size:2.5rem;margin:.8rem 0">${stars}</div><div style="font-size:1.1rem;font-weight:900;margin-bottom:1.2rem">答對 ${qScore} / ${qOrder.length}</div><button class="mode-btn active" onclick="startQuiz()" style="width:100%;padding:.7rem;font-size:.95rem">🔄 再做一次</button></div>`;
    }
    </script>
</body>
</html>
