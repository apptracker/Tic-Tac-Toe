    <style>
        .page{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;width:100%}
        .screen{display:none;width:100%;max-width:500px}.screen.on{display:block}
        .s-card{background:var(--bg-card);border-radius:20px;padding:2rem;box-shadow:0 20px 40px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);text-align:center}
        .s-title{font-size:2.2rem;font-weight:900;background:linear-gradient(135deg,#ffd93d,#ff6b6b,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.3rem}
        .s-sub{opacity:.5;margin-bottom:1.5rem;font-size:.9rem}
        .opt-row{display:flex;gap:8px;margin-bottom:1rem}
        .opt-btn{flex:1;padding:.6rem;border-radius:12px;border:2px solid var(--grid-line);background:var(--bg-dark);color:var(--text);font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer;transition:all .15s;text-align:center}
        .opt-btn:hover{border-color:rgba(255,255,255,.2)}.opt-btn.on{border-color:var(--accent-o);background:rgba(78,205,196,.12);color:var(--accent-o)}
        .go-btn{width:100%;padding:1rem;font-size:1.15rem;font-weight:900;font-family:inherit;background:linear-gradient(135deg,#ffd93d,#ff6b6b,#a855f7);border:none;border-radius:14px;color:#fff;cursor:pointer;transition:transform .2s;margin-top:.5rem}
        .go-btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(255,107,107,.3)}
        .lbl{font-size:.8rem;font-weight:700;opacity:.4;margin-bottom:.5rem;text-align:left}
        #gameCanvas{display:block;border-radius:16px;width:100%;max-width:500px;touch-action:none;background:#000}
        .game-wrap{position:relative;width:100%;max-width:500px}
        .q-bar{position:absolute;top:0;left:0;right:0;text-align:center;padding:.6rem;font-size:1.4rem;font-weight:900;color:#fff;text-shadow:0 2px 8px rgba(0,0,0,.8);z-index:5;pointer-events:none}
        .q-bar .qop{color:#ffd93d}
        .hud-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:.4rem .8rem;font-size:.75rem;font-weight:700;color:rgba(255,255,255,.7);z-index:5;pointer-events:none}
        .r-card{background:var(--bg-card);border-radius:20px;padding:2rem;box-shadow:0 20px 40px rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.05);text-align:center}
        .r-title{font-size:1.8rem;font-weight:900;margin-bottom:.5rem}
        .r-stars{font-size:3rem;margin:.8rem 0}
        .r-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:1rem 0}
        .r-stat{background:var(--bg-dark);border-radius:12px;padding:.7rem}.r-sv{font-size:1.2rem;font-weight:900;color:var(--accent-gold)}.r-sl{font-size:.65rem;opacity:.4;margin-top:.2rem}
        .r-btn{width:100%;padding:.8rem;font-size:1rem;font-weight:700;font-family:inherit;border:none;border-radius:12px;cursor:pointer;margin-top:.5rem;transition:transform .2s}
        .r-btn:hover{transform:translateY(-2px)}
        .r-btn.pri{background:linear-gradient(135deg,var(--accent-gold),var(--accent-x));color:#1a1a2e}
        .r-btn.sec{background:var(--bg-dark);color:var(--text);border:2px solid var(--grid-line)}
    </style>
</head>
<body>
    <nav class="sidebar" id="sidebar"><a class="sidebar-brand" href="index.html">姚家遊戲區</a><div class="sidebar-section">遊戲</div><ul class="sidebar-nav"><li><a class="sidebar-link" href="index.html"><span class="nav-emoji">🎮</span> 井字過三關</a></li><li><a class="sidebar-link" href="multiply.html"><span class="nav-emoji">✖️</span> 乘法大冒險</a></li><li><a class="sidebar-link" href="multiply-td.html"><span class="nav-emoji">🏰</span> 乘法守城戰</a></li><li><a class="sidebar-link active" href="space.html"><span class="nav-emoji">🚀</span> 太空數學射擊</a></li></ul><div class="sidebar-section">學習</div><ul class="sidebar-nav"><li><a class="sidebar-link" href="gs.html"><span class="nav-emoji">📖</span> 常識溫習</a></li></ul><div class="sidebar-footer">姚家遊戲區 © 2026</div></nav>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
    <div class="topbar"><button class="hamburger" id="menuOpen">☰</button><span class="topbar-title">姚家遊戲區</span></div>

    <div class="main-content page">
        <!-- START -->
        <div class="screen on" id="scrStart">
            <div class="s-card">
                <div class="s-title">🚀 太空數學射擊</div>
                <div class="s-sub">射擊正確答案，消滅外星人！</div>
                <div class="lbl">計算類型</div>
                <div class="opt-row">
                    <button class="opt-btn on" id="optAdd">➕ 加法</button>
                    <button class="opt-btn" id="optSub">➖ 減法</button>
                </div>
                <div class="lbl">數字範圍</div>
                <div class="opt-row">
                    <button class="opt-btn on" id="rng1">1-9</button>
                    <button class="opt-btn" id="rng2">1-20</button>
                    <button class="opt-btn" id="rng3">1-50</button>
                </div>
                <button class="go-btn" id="goBtn">🚀 開始射擊！</button>
            </div>
        </div>
        <!-- GAME -->
        <div class="screen" id="scrGame">
            <div class="game-wrap">
                <div class="hud-bar"><span id="hudScore">分數: 0</span><span id="hudCombo"></span><span id="hudLives">❤️❤️❤️</span></div>
                <div class="q-bar" id="qBar"></div>
                <canvas id="gameCanvas" width="500" height="700"></canvas>
            </div>
        </div>
        <!-- RESULT -->
        <div class="screen" id="scrResult">
            <div class="r-card">
                <div class="r-title" id="rTitle"></div>
                <div class="r-stars" id="rStars"></div>
                <div class="r-stats">
                    <div class="r-stat"><div class="r-sv" id="rsScore">0</div><div class="r-sl">分數</div></div>
                    <div class="r-stat"><div class="r-sv" id="rsHit">0</div><div class="r-sl">命中</div></div>
                    <div class="r-stat"><div class="r-sv" id="rsCombo">0</div><div class="r-sl">最高連擊</div></div>
                </div>
                <button class="r-btn pri" id="rRetry">🔄 再玩一次</button>
                <button class="r-btn sec" id="rBack">🏠 返回選擇</button>
            </div>
        </div>
    </div>

    <script src="nav.js"></script>
<script>
const cv=document.getElementById('gameCanvas'),cx=cv.getContext('2d');
const W=500,H=700;
let useAdd=true,useSub=false,numMax=9;
let score=0,lives=3,combo=0,maxCombo=0,hits=0,wave=0,playing=false;
let ship,bullets,aliens,particles,stars,explosions,texts,shakeT=0;
let question={a:0,b:0,op:'+',ans:0};
let alienSpeed=0.4,spawnCD=0,nextQ=true;

// Options
document.getElementById('optAdd').onclick=function(){this.classList.toggle('on');useAdd=this.classList.contains('on');};
document.getElementById('optSub').onclick=function(){this.classList.toggle('on');useSub=this.classList.contains('on');};
['rng1','rng2','rng3'].forEach(id=>{document.getElementById(id).onclick=function(){document.querySelectorAll('[id^=rng]').forEach(b=>b.classList.remove('on'));this.classList.add('on');numMax=id==='rng1'?9:id==='rng2'?20:50;};});
document.getElementById('goBtn').onclick=startGame;
document.getElementById('rRetry').onclick=startGame;
document.getElementById('rBack').onclick=()=>showScr('scrStart');

function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

function startGame(){
    if(!useAdd&&!useSub){useAdd=true;document.getElementById('optAdd').classList.add('on');}
    score=0;lives=3;combo=0;maxCombo=0;hits=0;wave=0;playing=true;
    alienSpeed=0.4;spawnCD=0;nextQ=true;
    ship={x:W/2,y:H-60,w:40,trail:[]};
    bullets=[];aliens=[];particles=[];explosions=[];texts=[];
    stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*1+0.3});
    showScr('scrGame');
    updateHud();
    genQuestion();
    requestAnimationFrame(loop);
}

function genQuestion(){
    const ops=[];if(useAdd)ops.push('+');if(useSub)ops.push('-');
    const op=ops[Math.floor(Math.random()*ops.length)];
    let a,b,ans;
    if(op==='+'){a=Math.floor(Math.random()*numMax)+1;b=Math.floor(Math.random()*numMax)+1;ans=a+b;}
    else{a=Math.floor(Math.random()*numMax)+2;b=Math.floor(Math.random()*a)+1;ans=a-b;}
    question={a,b,op,ans};
    document.getElementById('qBar').innerHTML=`${a} <span class="qop">${op}</span> ${b} = <span class="qop">?</span>`;
    spawnAliens();
}

function spawnAliens(){
    aliens=[];
    const correct=question.ans;
    const wrongs=new Set([correct]);
    while(wrongs.size<4){let w=correct+Math.floor(Math.random()*11)-5;if(w>=0&&w!==correct)wrongs.add(w);}
    const opts=[...wrongs].sort(()=>Math.random()-.5);
    const colors=['#ff6b6b','#4ecdc4','#ffd93d','#a855f7'];
    const emojis=['👾','👽','🛸','🤖','👻','😈','🐙'];
    opts.forEach((v,i)=>{
        aliens.push({
            x:60+i*120+Math.random()*20, y:-40-Math.random()*60,
            val:v, correct:v===correct,
            w:50, h:50, color:colors[i],
            emoji:emojis[Math.floor(Math.random()*emojis.length)],
            hp:1, wobble:Math.random()*Math.PI*2,
            targetY:120+Math.random()*200
        });
    });
}

function fire(){
    if(!playing)return;
    bullets.push({x:ship.x,y:ship.y-20,speed:10});
    for(let i=0;i<3;i++)particles.push({x:ship.x+Math.random()*10-5,y:ship.y-10,vx:Math.random()*2-1,vy:2+Math.random()*2,life:15,color:'#4FC3F7',size:3});
}

function explode(x,y,color,big){
    const n=big?30:15;
    for(let i=0;i<n;i++){
        const angle=Math.random()*Math.PI*2,speed=Math.random()*(big?6:4)+1;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:30+Math.random()*20,color:color||'#ffd93d',size:Math.random()*4+2});
    }
    if(big)for(let i=0;i<8;i++){
        const angle=Math.random()*Math.PI*2,speed=Math.random()*2+0.5;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:50,color:'#fff',size:Math.random()*6+3});
    }
    explosions.push({x,y,r:0,maxR:big?60:35,life:big?20:12});
}

function addText(x,y,txt,color,big){texts.push({x,y,txt,color:color||'#fff',size:big?28:18,life:40,vy:-1.5});}

function updateHud(){
    document.getElementById('hudScore').textContent='分數: '+score;
    document.getElementById('hudLives').textContent='❤️'.repeat(Math.max(0,lives));
    document.getElementById('hudCombo').textContent=combo>=2?'🔥'+combo+'連擊':'';
}

function loop(ts){
    if(!playing)return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update(){
    // Stars
    stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
    // Ship trail
    ship.trail.push({x:ship.x,y:ship.y,life:12});
    ship.trail=ship.trail.filter(t=>{t.life--;t.y+=1;return t.life>0;});
    // Bullets
    bullets.forEach(b=>{b.y-=b.speed;});
    bullets=bullets.filter(b=>b.y>-20);
    // Aliens
    aliens.forEach(a=>{
        if(a.hp<=0)return;
        if(a.y<a.targetY)a.y+=alienSpeed;
        a.wobble+=0.05;
        a.drawX=a.x+Math.sin(a.wobble)*8;
    });
    // Collision
    for(let bi=bullets.length-1;bi>=0;bi--){
        const b=bullets[bi];
        for(let ai=aliens.length-1;ai>=0;ai--){
            const a=aliens[ai];
            if(a.hp<=0)continue;
            if(Math.abs(b.x-a.drawX)<a.w/2+5&&Math.abs(b.y-a.y)<a.h/2+5){
                bullets.splice(bi,1);
                a.hp=0;
                if(a.correct){
                    combo++;if(combo>maxCombo)maxCombo=combo;
                    hits++;
                    const pts=10+combo*5+(wave*2);
                    score+=pts;
                    explode(a.drawX,a.y,a.color,true);
                    addText(a.drawX,a.y-20,'+'+pts,'#ffd93d',true);
                    if(combo>=3)addText(a.drawX,a.y-50,'🔥'+combo+'連擊！','#ff6b6b');
                    shakeT=8;
                    wave++;
                    if(wave%5===0)alienSpeed=Math.min(1.5,alienSpeed+0.1);
                    setTimeout(()=>{if(playing)genQuestion();},600);
                }else{
                    combo=0;
                    lives--;
                    explode(a.drawX,a.y,'#ff4444',false);
                    addText(a.drawX,a.y-20,'✗ 錯誤！','#ff6b6b');
                    shakeT=12;
                    if(lives<=0){playing=false;setTimeout(endGame,800);}
                }
                updateHud();
                break;
            }
        }
    }
    // Particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=0.97;});
    particles=particles.filter(p=>p.life>0);
    // Explosions
    explosions.forEach(e=>{e.r+=e.maxR/e.life*2;e.life--;});
    explosions=explosions.filter(e=>e.life>0);
    // Texts
    texts.forEach(t=>{t.y+=t.vy;t.life--;});
    texts=texts.filter(t=>t.life>0);
    // Shake
    if(shakeT>0)shakeT--;
}

function draw(){
    cx.save();
    if(shakeT>0){cx.translate(Math.random()*shakeT-shakeT/2,Math.random()*shakeT-shakeT/2);}
    cx.fillStyle='#05051a';cx.fillRect(0,0,W,H);
    // Stars
    stars.forEach(s=>{cx.globalAlpha=0.5+s.s*0.2;cx.fillStyle='#fff';cx.fillRect(s.x,s.y,s.s,s.s);});
    cx.globalAlpha=1;
    // Ship trail
    ship.trail.forEach(t=>{cx.globalAlpha=t.life/12*0.3;cx.fillStyle='#4FC3F7';cx.beginPath();cx.arc(t.x,t.y,4,0,Math.PI*2);cx.fill();});
    cx.globalAlpha=1;
    // Ship
    cx.font='36px sans-serif';cx.textAlign='center';cx.fillText('🚀',ship.x,ship.y);
    // Thruster
    cx.fillStyle='#FF9800';cx.globalAlpha=0.6+Math.random()*0.4;
    cx.beginPath();cx.moveTo(ship.x-8,ship.y+8);cx.lineTo(ship.x,ship.y+20+Math.random()*8);cx.lineTo(ship.x+8,ship.y+8);cx.fill();
    cx.globalAlpha=1;
    // Bullets
    bullets.forEach(b=>{
        const g=cx.createLinearGradient(b.x,b.y,b.x,b.y+12);
        g.addColorStop(0,'#4FC3F7');g.addColorStop(1,'#0288D1');
        cx.fillStyle=g;cx.fillRect(b.x-2,b.y,4,12);
        cx.fillStyle='#fff';cx.globalAlpha=0.8;cx.fillRect(b.x-1,b.y,2,6);cx.globalAlpha=1;
    });
    // Aliens
    aliens.forEach(a=>{
        if(a.hp<=0)return;
        cx.font='36px sans-serif';cx.textAlign='center';cx.fillText(a.emoji,a.drawX||a.x,a.y+10);
        // Answer bubble
        cx.fillStyle=a.correct?a.color:a.color;
        cx.globalAlpha=0.9;
        const bw=36,bh=28;
        cx.beginPath();cx.roundRect(a.drawX-bw/2,a.y+20,bw,bh,8);cx.fill();
        cx.globalAlpha=1;
        cx.fillStyle='#fff';cx.font='bold 16px "Noto Sans TC",sans-serif';
        cx.fillText(a.val,a.drawX,a.y+40);
    });
    // Explosions
    explosions.forEach(e=>{
        cx.globalAlpha=e.life/20*0.4;
        const g=cx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
        g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffd93d');g.addColorStop(1,'transparent');
        cx.fillStyle=g;cx.beginPath();cx.arc(e.x,e.y,e.r,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
    });
    // Particles
    particles.forEach(p=>{cx.globalAlpha=p.life/50;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();});
    cx.globalAlpha=1;
    // Texts
    texts.forEach(t=>{
        cx.globalAlpha=Math.min(1,t.life/20);
        cx.fillStyle=t.color;cx.font=`bold ${t.size}px "Noto Sans TC",sans-serif`;cx.textAlign='center';
        cx.shadowColor=t.color;cx.shadowBlur=10;
        cx.fillText(t.txt,t.x,t.y);
        cx.shadowBlur=0;
    });
    cx.globalAlpha=1;
    cx.restore();
}

function endGame(){
    const pct=hits>0?Math.min(100,Math.round(hits/(hits+3-lives+Math.max(0,3-lives))*100)):0;
    const st=wave>=20?3:wave>=10?2:wave>=5?1:0;
    const titles=['繼續加油！💪','做得不錯！👍','太強了！🎉','傳說級！🏆'];
    document.getElementById('rTitle').textContent=titles[st];
    document.getElementById('rStars').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
    document.getElementById('rsScore').textContent=score;
    document.getElementById('rsHit').textContent=hits;
    document.getElementById('rsCombo').textContent=maxCombo;
    showScr('scrResult');
}

// Controls
let pointer={down:false,x:W/2};
function pMove(px){
    const rect=cv.getBoundingClientRect();
    const scaleX=W/rect.width;
    ship.x=Math.max(20,Math.min(W-20,(px-rect.left)*scaleX));
}
cv.addEventListener('touchstart',e=>{e.preventDefault();pointer.down=true;pMove(e.touches[0].clientX);fire();},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',()=>pointer.down=false);
cv.addEventListener('mousedown',e=>{pointer.down=true;pMove(e.clientX);fire();});
cv.addEventListener('mousemove',e=>{if(pointer.down)pMove(e.clientX);});
cv.addEventListener('mouseup',()=>pointer.down=false);
cv.addEventListener('click',e=>{pMove(e.clientX);fire();});

// Auto-fire on touch hold
setInterval(()=>{if(pointer.down&&playing)fire();},300);
</script>
