        .name-input:focus{outline:none;border-color:var(--accent-gold)}

<script>
const cv=document.getElementById('gameCanvas'),cx=cv.getContext('2d');
const W=500,H=700;
let useAdd=true,useSub=false,numMax=9;
let score=0,lives=3,combo=0,maxCombo=0,hits=0,wave=0,playing=false;
// Spaced repetition: track wrong answers in localStorage
const SR_KEY='space_sr_weights';
function loadSR(){try{return JSON.parse(localStorage.getItem(SR_KEY))||{};}catch(e){return {};}}
function saveSR(w){try{localStorage.setItem(SR_KEY,JSON.stringify(w));}catch(e){}}
function srKey(a,op,b){return a+op+b;}
function markWrong(a,op,b){const w=loadSR();const k=srKey(a,op,b);w[k]=(w[k]||1)+2;saveSR(w);}
function markRight(a,op,b){const w=loadSR();const k=srKey(a,op,b);if(w[k])w[k]=Math.max(1,w[k]-1);saveSR(w);}
// Progressive difficulty
function getDiffRange(){
    if(wave<3)return Math.min(numMax,5);
    if(wave<6)return Math.min(numMax,7);
    return numMax;
}
function getAlienSpeed(){return 0.3+wave*0.02;}
let ship,bullets,aliens,particles,stars,explosions,texts,shakeT=0;
let question={a:0,b:0,op:'+',ans:0};
let alienSpeed=0.4,spawnCD=0,nextQ=true;
let flashColor='',flashLife=0,bigMsg={txt:'',sub:'',color:'',life:0},frozen=false,waitConfirm=false;

// Options
document.getElementById('optAdd').onclick=function(){this.classList.toggle('on');useAdd=this.classList.contains('on');};
document.getElementById('optSub').onclick=function(){this.classList.toggle('on');useSub=this.classList.contains('on');};
['rng1','rng2','rng3'].forEach(id=>{document.getElementById(id).onclick=function(){document.querySelectorAll('[id^=rng]').forEach(b=>b.classList.remove('on'));this.classList.add('on');numMax=id==='rng1'?9:id==='rng2'?20:50;};});
document.getElementById('goBtn').onclick=startGame;
document.getElementById('rRetry').onclick=startGame;
document.getElementById('rBack').onclick=()=>showScr('scrStart');

function showScr(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));document.getElementById(id).classList.add('on');}

function startGame(){
    if(!useAdd&&!useSub){useAdd=true;document.getElementById('optAdd').classList.add('on');}
    score=0;lives=3;combo=0;maxCombo=0;hits=0;wave=0;playing=true;
    alienSpeed=0.3;spawnCD=0;nextQ=true;
    ship={x:W/2,y:H-60,w:40,trail:[]};
    bullets=[];aliens=[];particles=[];explosions=[];texts=[];
    stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:Math.random()*2+0.5,sp:Math.random()*1+0.3});
    showScr('scrGame');
    updateHud();
    genQuestion();
    requestAnimationFrame(loop);
}

function genQuestion(){
    const ops=[];if(useAdd)ops.push('+');if(useSub)ops.push('-');
    const range=getDiffRange();
    alienSpeed=getAlienSpeed();
    // Build candidate pool with spaced repetition weights
    const sr=loadSR();
    const pool=[];
    for(const op of ops){
        for(let a=1;a<=range;a++){
            const bMax=op==='+'?range:a-1;
            for(let b=1;b<=bMax;b++){
                const weight=sr[srKey(a,op,b)]||1;
                for(let w=0;w<weight;w++) pool.push({a,b,op,ans:op==='+'?a+b:a-b});
            }
        }
    }
    const pick=pool[Math.floor(Math.random()*pool.length)];
    question=pick;
    document.getElementById('qBar').innerHTML=`${pick.a} <span class="qop">${pick.op}</span> ${pick.b} = <span class="qop">?</span>`;
    spawnAliens();
}

function spawnAliens(){
    aliens=[];
    const correct=question.ans;
    const wrongs=new Set([correct]);
    while(wrongs.size<4){let w=correct+Math.floor(Math.random()*11)-5;if(w>=0&&w!==correct)wrongs.add(w);}
    const opts=[...wrongs].sort(()=>Math.random()-.5);
    const colors=['#ff6b6b','#4ecdc4','#ffd93d','#a855f7'];
    const emojis=['👾','👽','🛸','🤖','👻','😈','🐙'];
    opts.forEach((v,i)=>{
        aliens.push({
            x:60+i*120+Math.random()*20, y:-40-Math.random()*60,
            val:v, correct:v===correct,
            w:50, h:50, color:colors[i],
            emoji:emojis[Math.floor(Math.random()*emojis.length)],
            hp:1, wobble:Math.random()*Math.PI*2,
            targetY:120+Math.random()*200
        });
    });
}

function fire(){
    if(!playing||frozen)return;
    bullets.push({x:ship.x,y:ship.y-20,speed:10});
    for(let i=0;i<3;i++)particles.push({x:ship.x+Math.random()*10-5,y:ship.y-10,vx:Math.random()*2-1,vy:2+Math.random()*2,life:15,color:'#4FC3F7',size:3});
}

function explode(x,y,color,big){
    const n=big?30:15;
    for(let i=0;i<n;i++){
        const angle=Math.random()*Math.PI*2,speed=Math.random()*(big?6:4)+1;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:30+Math.random()*20,color:color||'#ffd93d',size:Math.random()*4+2});
    }
    if(big)for(let i=0;i<8;i++){
        const angle=Math.random()*Math.PI*2,speed=Math.random()*2+0.5;
        particles.push({x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,life:50,color:'#fff',size:Math.random()*6+3});
    }
    explosions.push({x,y,r:0,maxR:big?60:35,life:big?20:12});
}

function addText(x,y,txt,color,big){texts.push({x,y,txt,color:color||'#fff',size:big?28:18,life:40,vy:-1.5});}

function updateHud(){
    document.getElementById('hudScore').textContent='分數: '+score;
    document.getElementById('hudLives').textContent='❤️'.repeat(Math.max(0,lives));
    document.getElementById('hudCombo').textContent=combo>=2?'🔥'+combo+'連擊':'';
}

function loop(ts){
    if(!playing)return;
    update();
    draw();
    requestAnimationFrame(loop);
}

function update(){
    if(frozen){if(shakeT>0)shakeT--;particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=0.97;});particles=particles.filter(p=>p.life>0);explosions.forEach(e=>{e.r+=e.maxR/e.life*2;e.life--;});explosions=explosions.filter(e=>e.life>0);return;}
    // Stars
    stars.forEach(s=>{s.y+=s.sp;if(s.y>H){s.y=0;s.x=Math.random()*W;}});
    // Ship trail
    ship.trail.push({x:ship.x,y:ship.y,life:12});
    ship.trail=ship.trail.filter(t=>{t.life--;t.y+=1;return t.life>0;});
    // Bullets
    bullets.forEach(b=>{b.y-=b.speed;});
    bullets=bullets.filter(b=>b.y>-20);
    // Aliens
    aliens.forEach(a=>{
        if(a.hp<=0)return;
        if(a.y<a.targetY)a.y+=alienSpeed;
        a.wobble+=0.05;
        a.drawX=a.x+Math.sin(a.wobble)*8;
    });
    // Collision
    for(let bi=bullets.length-1;bi>=0;bi--){
        const b=bullets[bi];
        for(let ai=aliens.length-1;ai>=0;ai--){
            const a=aliens[ai];
            if(a.hp<=0)continue;
            if(Math.abs(b.x-a.drawX)<a.w/2+5&&Math.abs(b.y-a.y)<a.h/2+5){
                bullets.splice(bi,1);
                a.hp=0;
                if(a.correct){
                    combo++;if(combo>maxCombo)maxCombo=combo;
                    hits++;
                    const pts=10+combo*5+(wave*2);
                    score+=pts;
                    markRight(question.a,question.op,question.b);
                    explode(a.drawX,a.y,'#4CAF50',true);
                    explode(a.drawX,a.y,'#ffd93d',true);
                    flashColor='rgba(76,175,80,0.2)';flashLife=10;
                    bigMsg={txt:'✓ 正確！',sub:'+'+pts,color:'#4CAF50',life:25};
                    if(combo>=3)bigMsg.txt='🔥'+combo+'連擊！';
                    shakeT=4;
                    wave++;
                    if(wave%5===0)alienSpeed=Math.min(1.5,alienSpeed+0.1);
                    frozen=true;setTimeout(()=>{frozen=false;if(playing)genQuestion();},500);
                }else{
                    combo=0;
                    lives--;
                    markWrong(question.a,question.op,question.b);
                    explode(a.drawX,a.y,'#F44336',false);
                    for(let k=0;k<20;k++){const ag=Math.random()*Math.PI*2;particles.push({x:a.drawX,y:a.y,vx:Math.cos(ag)*3,vy:Math.sin(ag)*3,life:40,color:'#F44336',size:Math.random()*5+2});}
                    flashColor='rgba(244,67,54,0.35)';flashLife=25;
                    bigMsg={txt:'✗ 答錯了！',sub:'正確答案是 '+question.ans+'　（'+question.a+' '+question.op+' '+question.b+' = '+question.ans+'）',color:'#F44336',life:9999};
                    shakeT=15;
                    frozen=true;waitConfirm=true;
                }
                updateHud();
                break;
            }
        }
    }
    // Particles
    particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.size*=0.97;});
    particles=particles.filter(p=>p.life>0);
    // Explosions
    explosions.forEach(e=>{e.r+=e.maxR/e.life*2;e.life--;});
    explosions=explosions.filter(e=>e.life>0);
    // Texts
    texts.forEach(t=>{t.y+=t.vy;t.life--;});
    texts=texts.filter(t=>t.life>0);
    // Shake
    if(shakeT>0)shakeT--;
}

function draw(){
    cx.save();
    if(shakeT>0){cx.translate(Math.random()*shakeT-shakeT/2,Math.random()*shakeT-shakeT/2);}
    cx.fillStyle='#05051a';cx.fillRect(0,0,W,H);
    // Stars
    stars.forEach(s=>{cx.globalAlpha=0.5+s.s*0.2;cx.fillStyle='#fff';cx.fillRect(s.x,s.y,s.s,s.s);});
    cx.globalAlpha=1;
    // Ship trail
    ship.trail.forEach(t=>{cx.globalAlpha=t.life/12*0.3;cx.fillStyle='#4FC3F7';cx.beginPath();cx.arc(t.x,t.y,4,0,Math.PI*2);cx.fill();});
    cx.globalAlpha=1;
    // Ship
    cx.font='36px sans-serif';cx.textAlign='center';cx.fillText('🚀',ship.x,ship.y);
    // Thruster
    cx.fillStyle='#FF9800';cx.globalAlpha=0.6+Math.random()*0.4;
    cx.beginPath();cx.moveTo(ship.x-8,ship.y+8);cx.lineTo(ship.x,ship.y+20+Math.random()*8);cx.lineTo(ship.x+8,ship.y+8);cx.fill();
    cx.globalAlpha=1;
    // Bullets
    bullets.forEach(b=>{
        const g=cx.createLinearGradient(b.x,b.y,b.x,b.y+12);
        g.addColorStop(0,'#4FC3F7');g.addColorStop(1,'#0288D1');
        cx.fillStyle=g;cx.fillRect(b.x-2,b.y,4,12);
        cx.fillStyle='#fff';cx.globalAlpha=0.8;cx.fillRect(b.x-1,b.y,2,6);cx.globalAlpha=1;
    });
    // Aliens
    aliens.forEach(a=>{
        if(a.hp<=0)return;
        cx.font='36px sans-serif';cx.textAlign='center';cx.fillText(a.emoji,a.drawX||a.x,a.y+10);
        // Answer bubble
        cx.fillStyle=a.correct?a.color:a.color;
        cx.globalAlpha=0.9;
        const bw=36,bh=28;
        cx.beginPath();cx.roundRect(a.drawX-bw/2,a.y+20,bw,bh,8);cx.fill();
        cx.globalAlpha=1;
        cx.fillStyle='#fff';cx.font='bold 16px "Noto Sans TC",sans-serif';
        cx.fillText(a.val,a.drawX,a.y+40);
    });
    // Explosions
    explosions.forEach(e=>{
        cx.globalAlpha=e.life/20*0.4;
        const g=cx.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
        g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffd93d');g.addColorStop(1,'transparent');
        cx.fillStyle=g;cx.beginPath();cx.arc(e.x,e.y,e.r,0,Math.PI*2);cx.fill();
        cx.globalAlpha=1;
    });
    // Particles
    particles.forEach(p=>{cx.globalAlpha=p.life/50;cx.fillStyle=p.color;cx.beginPath();cx.arc(p.x,p.y,p.size,0,Math.PI*2);cx.fill();});
    cx.globalAlpha=1;
    // Texts
    texts.forEach(t=>{
        cx.globalAlpha=Math.min(1,t.life/20);
        cx.fillStyle=t.color;cx.font=`bold ${t.size}px "Noto Sans TC",sans-serif`;cx.textAlign='center';
        cx.shadowColor=t.color;cx.shadowBlur=10;
        cx.fillText(t.txt,t.x,t.y);
        cx.shadowBlur=0;
    });
    cx.globalAlpha=1;
    // Full-screen flash
    if(flashLife>0){cx.fillStyle=flashColor;cx.fillRect(0,0,W,H);flashLife--;}
    // Big center message
    if(bigMsg.life>0){
        const alpha=Math.min(1,bigMsg.life/20);
        cx.globalAlpha=alpha;
        cx.fillStyle='rgba(0,0,0,0.7)';cx.fillRect(0,H/2-100,W,waitConfirm?220:160);
        cx.fillStyle=bigMsg.color;cx.font='bold 40px "Noto Sans TC",sans-serif';cx.textAlign='center';
        cx.shadowColor=bigMsg.color;cx.shadowBlur=20;
        cx.fillText(bigMsg.txt,W/2,H/2-20);
        cx.shadowBlur=0;
        cx.fillStyle='#fff';cx.font='bold 17px "Noto Sans TC",sans-serif';
        cx.fillText(bigMsg.sub,W/2,H/2+20);
        if(waitConfirm){
            cx.fillStyle='#ffd93d';cx.font='bold 20px "Noto Sans TC",sans-serif';
            cx.fillText('👆 點擊任意位置繼續',W/2,H/2+70);
        }
        cx.globalAlpha=1;
        if(!waitConfirm)bigMsg.life--;
    }
    cx.restore();
}

const LB_API='/api/leaderboard';
const LB_NAME_KEY='space_player_name';

async function fetchLB(){
    try{const r=await fetch(LB_API+'?game=space');return await r.json();}catch(e){return [];}
}
async function submitLB(name,s,h,c,w){
    try{localStorage.setItem(LB_NAME_KEY,name);
    const r=await fetch(LB_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({game:'space',name,score:s,hits:h,combo:c,wave:w})});
    return await r.json();}catch(e){return [];}
}
function renderLB(entries,myName){
    if(!entries||entries.length===0)return '<div class="lb-loading">暫時沒有記錄</div>';
    let html='<table class="lb-table"><tr><th>#</th><th>名字</th><th>分數</th><th>波數</th></tr>';
    entries.slice(0,15).forEach((e,i)=>{
        const me=e.name===myName?'lb-me':'';
        const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1);
        html+=`<tr class="${me}"><td class="lb-rank">${medal}</td><td class="lb-name">${e.name}</td><td class="lb-score">${e.score}</td><td>${e.wave||'-'}</td></tr>`;
    });
    return html+'</table>';
}

function endGame(){
    const st=wave>=20?3:wave>=10?2:wave>=5?1:0;
    const titles=['繼續加油！💪','做得不錯！👍','太強了！🎉','傳說級！🏆'];
    document.getElementById('rTitle').textContent=titles[st];
    document.getElementById('rStars').textContent='⭐'.repeat(st)+'☆'.repeat(3-st);
    document.getElementById('rsScore').textContent=score;
    document.getElementById('rsHit').textContent=hits;
    document.getElementById('rsCombo').textContent=maxCombo;
    showScr('scrResult');
    // Pre-fill name
    const saved=localStorage.getItem(LB_NAME_KEY);
    if(saved)document.getElementById('nameInput').value=saved;
    document.getElementById('nameArea').style.display='block';
    // Load leaderboard
    document.getElementById('lbArea').innerHTML='<div class="lb-loading">載入排行榜中...</div>';
    fetchLB().then(entries=>{
        document.getElementById('lbArea').innerHTML='<div class="lb-title">🏆 全球排行榜</div>'+renderLB(entries,saved);
    });
    // Submit handler
    document.getElementById('submitScore').onclick=async()=>{
        const name=document.getElementById('nameInput').value.trim();
        if(!name){document.getElementById('nameInput').style.borderColor='var(--accent-x)';return;}
        document.getElementById('submitScore').textContent='提交中...';
        document.getElementById('submitScore').disabled=true;
        const entries=await submitLB(name,score,hits,maxCombo,wave);
        document.getElementById('nameArea').style.display='none';
        document.getElementById('lbArea').innerHTML='<div class="lb-title">🏆 全球排行榜</div>'+renderLB(entries,name);
    };
}

// Controls
let pointer={down:false,x:W/2};
function pMove(px){
    const rect=cv.getBoundingClientRect();
    const scaleX=W/rect.width;
    ship.x=Math.max(20,Math.min(W-20,(px-rect.left)*scaleX));
}
cv.addEventListener('touchstart',e=>{e.preventDefault();
    if(waitConfirm){waitConfirm=false;bigMsg.life=0;frozen=false;if(lives<=0){playing=false;setTimeout(endGame,300);}else setTimeout(()=>{if(playing)genQuestion();},200);return;}
    pointer.down=true;pMove(e.touches[0].clientX);fire();},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();pMove(e.touches[0].clientX);},{passive:false});
cv.addEventListener('touchend',()=>pointer.down=false);
cv.addEventListener('mousedown',e=>{pointer.down=true;pMove(e.clientX);fire();});
cv.addEventListener('mousemove',e=>{if(pointer.down)pMove(e.clientX);});
cv.addEventListener('mouseup',()=>pointer.down=false);
cv.addEventListener('click',e=>{
    if(waitConfirm){
        waitConfirm=false;bigMsg.life=0;frozen=false;
        if(lives<=0){playing=false;setTimeout(endGame,300);}
        else setTimeout(()=>{if(playing)genQuestion();},200);
        return;
    }
    pMove(e.clientX);fire();
});

// Auto-fire on touch hold
setInterval(()=>{if(pointer.down&&playing)fire();},300);
</script>
